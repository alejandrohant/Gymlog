<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="#12051f" name="theme-color"/>
<meta content="dark" name="color-scheme"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<title>FORJA — Bitácora de entrenamiento</title>
<link href="forja-icon.png?v=20260605" rel="icon" sizes="512x512" type="image/png"/>
<link href="forja-icon-180.png?v=20260605" rel="apple-touch-icon" sizes="180x180"/>
<link href="manifest.webmanifest?v=20260605" rel="manifest"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=20260605">
</head>
<body>
<div class="header">
<div class="brand">
<div>
<div class="header-title">FORJA</div>
<div class="header-sub">Alejandro • Cuerpo en construcción</div>
</div>
</div>
</div>
<div aria-live="polite" class="timer-wrap">
<div class="rest-timer" id="timerDisplay"></div>
<div class="timer-controls" id="timerControls">
<button aria-label="Quitar 15 segundos" class="timer-control-btn" onclick="adjustTimer(-15)" title="Quitar 15 segundos">−</button>
<button aria-label="Agregar 15 segundos" class="timer-control-btn" onclick="adjustTimer(15)" title="Agregar 15 segundos">+</button>
<button aria-label="Pausar o continuar" class="timer-control-btn" id="timerPauseBtn" onclick="toggleTimerPause()" title="Pausar o continuar">⏸</button>
<button aria-label="Detener temporizador" class="timer-control-btn" onclick="stopTimer()" title="Detener temporizador">⏹</button>
</div>
</div>
<div class="nav">
<button aria-label="Rutinas" class="nav-btn" onclick="showScreen('home')" title="Rutinas">🏋️</button>
<button aria-label="Historial" class="nav-btn" onclick="showScreen('history')" title="Historial">📋</button>
<button aria-label="Progreso" class="nav-btn" onclick="showScreen('profile')" title="Progreso">📈</button>
<button aria-label="Cuenta" class="nav-btn active" onclick="showScreen('auth')" title="Cuenta">🔐</button>
</div>
<div class="screen" id="homeScreen">
<div class="section-title">HOY TOCA</div>
<div class="routine-grid" id="routineGrid"></div>
</div>
<div class="screen" id="historyScreen">
<div class="history-toolbar history-toolbar-clean">
<div class="section-title" style="margin:0;">SESIONES</div>
<button aria-label="Exportar historial" class="history-share-all-btn" onclick="openExportMenu()" title="Exportar historial">⤴</button>
</div>
<div id="historyList"></div>
</div>
<div class="screen" id="sessionScreen">
<div class="session-legacy-actions">
<button aria-label="Ocultar entrenamiento" class="session-hide-btn" onclick="minimizeSession()" title="Ocultar entrenamiento">⌄</button>
<button aria-label="Descartar entrenamiento" class="session-discard-btn" onclick="discardSession()" title="Descartar entrenamiento">DESCARTAR</button>
</div>
<div class="session-header">
<div class="session-title" id="sessionTitle"></div>
<div class="session-date" id="sessionDate"></div>
</div>
<div id="exerciseList"></div>
<button class="finish-btn" onclick="finishSession()">TERMINAR SESIÓN</button>
</div>
<div class="screen" id="detailScreen">
<button class="back-btn" onclick="showScreen('history')">← Historial</button>
<div id="detailContent"></div>
</div>
<div class="screen" id="profileScreen">
<div class="section-title">PROGRESO</div>
<div id="profileContent"></div>
</div>
<div class="screen active" id="authScreen">
<div class="section-title">CUENTA</div>
<div id="authPanel"></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js?v=20260605"></script>
</body>
</html>
