<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0314">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FORJA — Bitácora de entrenamiento</title>
<link rel="icon" type="image/png" sizes="512x512" href="forja-icon.png?v=11">
<link rel="apple-touch-icon" sizes="180x180" href="forja-icon.png?v=11">
<link rel="manifest" href="manifest.webmanifest?v=11">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12051f;
    --bg2: #1a0b2b;
    --surface: rgba(33, 17, 49, 0.88);
    --surface-strong: rgba(40, 22, 60, 0.96);
    --surface-soft: rgba(255,255,255,0.04);
    --surface2: #241238;
    --border: rgba(205, 180, 120, 0.12);
    --border-strong: rgba(205, 180, 120, 0.22);
    --accent: #c9a44c;
    --accent2: #8f5a2f;
    --accent-soft: rgba(201, 164, 76, 0.12);
    --text: #f7f2ea;
    --muted: #a89cb8;
    --danger: #ff5d68;
    --success: #47ff8a;
    --shadow: 0 18px 48px rgba(0,0,0,0.34);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    background:
      radial-gradient(circle at top, rgba(201,164,76,0.08), transparent 22%),
      linear-gradient(180deg, #0d0418 0%, #12051f 25%, #170826 100%);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
    background:
      radial-gradient(circle at top left, rgba(201,164,76,0.08), transparent 28%),
      radial-gradient(circle at top right, rgba(143,90,47,0.10), transparent 24%),
      linear-gradient(180deg, #0d0418 0%, #12051f 20%, #18092b 100%);
  }

  .header {
    background: rgba(18,5,31,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 0.95;
    text-shadow: 0 6px 22px rgba(201,164,76,0.18);
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.3px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .nav {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 12px 16px 0;
    padding: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 18px;
    position: sticky;
    top: 82px;
    z-index: 99;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .nav-btn {
    flex: initial;
    padding: 11px 6px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.18s ease;
  }

  .nav-btn.active {
    color: #12051f;
    background: linear-gradient(180deg, #d8b35a 0%, #b88d31 100%);
    box-shadow: 0 10px 24px rgba(201,164,76,0.22);
  }

  .screen {
    display: none;
    padding: 18px 18px 110px;
    overflow-y: auto;
  }

  .screen.active {
    display: block;
    overflow-y: auto;
    height: calc(100vh - 132px);
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 2px;
    color: #d1c5df;
    margin-bottom: 14px;
    margin-top: 6px;
    margin-left: 4px;
  }

  .routine-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .routine-card,
  .exercise-card,
  .history-card {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%),
      rgba(31, 14, 46, 0.86);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .routine-card {
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.18s ease, border-color 0.18s ease;
  }

  .routine-card:active {
    transform: scale(0.985);
    border-color: var(--border-strong);
  }

  .routine-emoji {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    font-size: 28px;
    background: linear-gradient(180deg, rgba(201,164,76,0.18), rgba(201,164,76,0.08));
    border: 1px solid rgba(201,164,76,0.18);
    flex-shrink: 0;
  }

  .routine-info { flex: 1; }

  .routine-name {
    font-weight: 700;
    font-size: 17px;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }

  .routine-meta {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.35;
  }

  .session-header {
    margin-bottom: 20px;
    padding: 4px 4px 0;
  }

  .session-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
    line-height: 0.95;
  }

  .session-date {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 2px 0;
    margin-bottom: 16px;
  }

  .exercise-card,
  .history-card {
    margin-bottom: 14px;
    overflow: hidden;
  }

  .exercise-header {
    padding: 15px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .exercise-name {
    font-weight: 700;
    font-size: 14px;
    line-height: 1.25;
  }

  .prev-badge {
    font-size: 10px;
    color: #1b1000;
    background: linear-gradient(180deg, #dfbb63 0%, #c39a43 100%);
    padding: 4px 8px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .prev-info {
    padding: 9px 16px;
    background: var(--accent-soft);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .prev-info span {
    color: #e8c779;
    font-weight: 600;
  }

  .sets-table { padding: 14px 16px 16px; }

  .sets-header {
    display: grid;
    grid-template-columns: 30px 1fr 1fr 38px;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
  }

  .set-row {
    display: grid;
    grid-template-columns: 30px 1fr 1fr 38px;
    gap: 8px;
    margin-bottom: 9px;
    align-items: center;
  }

  .set-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-align: center;
  }

  .set-input,
  .notes-input,
  input[type="email"],
  input[type="password"] {
    background: rgba(10, 4, 18, 0.52);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 11px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    -webkit-appearance: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .set-input { text-align: center; }

  .set-input:focus,
  .notes-input:focus,
  input[type="email"]:focus,
  input[type="password"]:focus {
    outline: none;
    border-color: rgba(201,164,76,0.55);
    box-shadow: 0 0 0 3px rgba(201,164,76,0.10);
  }

  .set-input.completed {
    border-color: rgba(71,255,138,0.55);
    color: var(--success);
  }

  .set-check {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.2s;
    color: var(--muted);
  }

  .set-check.done {
    background: linear-gradient(180deg, #47ff8a 0%, #2fdb72 100%);
    border-color: transparent;
    color: #03130a;
    box-shadow: 0 8px 18px rgba(71,255,138,0.20);
  }

  .add-set-btn {
    width: 100%;
    padding: 11px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(201,164,76,0.24);
    border-radius: 14px;
    color: #d8c089;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 7px;
    transition: all 0.18s ease;
  }

  .finish-btn {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 34px);
    max-width: 446px;
    padding: 16px;
    background: linear-gradient(180deg, #ddb965 0%, #bc9138 100%);
    color: #140813;
    border: none;
    border-radius: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 18px 34px rgba(201,164,76,0.20);
  }

  .finish-btn:active { transform: translateX(-50%) scale(0.985); }

  .history-card {
    padding: 16px;
    cursor: pointer;
  }

  .history-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .history-name {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
    margin-right: 10px;
  }

  .history-date {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }

  .history-stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .history-stat {
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 999px;
    padding: 6px 10px;
  }

  .history-stat strong {
    color: var(--text);
    font-weight: 700;
  }

  .detail-set {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
  }

  .detail-set-num {
    width: 24px;
    height: 24px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
  }

  .detail-set-data { flex: 1; }
  .detail-set-weight { font-weight: 700; }
  .detail-set-reps { color: var(--muted); font-size: 12px; }

  .empty {
    text-align: center;
    padding: 74px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 50px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.7; }

  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(180deg, #47ff8a 0%, #2fdb72 100%);
    color: #06170d;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
    box-shadow: 0 14px 28px rgba(71,255,138,0.16);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .rest-timer {
    position: static;
    display: none;
    margin-top: -2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: 1.2px;
    color: #a56dff;
    background: none;
    padding: 0;
    border: none;
    border-radius: 0;
    cursor: default;
    text-shadow: 0 0 18px rgba(165,109,255,0.28), 0 0 36px rgba(121,74,255,0.18);
    z-index: 150;
    user-select: none;
    -webkit-user-select: none;
  }

  .rest-timer.visible { display: block; }

  .notes-input {
    resize: none;
    margin-top: 8px;
    min-height: 64px;
  }

  button {
    transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
  }

  button:active {
    transform: scale(0.985);
  }



  #sessionScreen {
    padding-top: 12px;
    background:
      radial-gradient(circle at top, rgba(201,164,76,0.06), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,0.01) 0%, transparent 20%);
  }

  .session-header {
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 16px 16px 14px;
    margin-bottom: 16px;
    box-shadow: 0 14px 28px rgba(0,0,0,0.22);
  }

  .session-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(201,164,76,0.12);
    border: 1px solid rgba(201,164,76,0.16);
    color: #e6c26b;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    margin-bottom: 12px;
  }

  .session-overview {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
      rgba(23, 10, 37, 0.92);
    border: 1px solid var(--border-strong);
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 18px 42px rgba(0,0,0,0.28);
  }

  .session-overview-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .session-overview-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1.4px;
    color: var(--text);
    line-height: 0.95;
  }

  .session-overview-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
  }

  .session-progress-ring {
    min-width: 58px;
    height: 58px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, rgba(201,164,76,0.22), rgba(201,164,76,0.08));
    border: 1px solid rgba(201,164,76,0.18);
    color: var(--accent);
    font-weight: 700;
    font-size: 16px;
  }

  .session-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .session-stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 12px;
  }

  .session-stat-label {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .session-stat-value {
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
  }

  .training-card {
    position: relative;
    overflow: hidden;
  }

  .training-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: linear-gradient(180deg, #dfbb63 0%, rgba(223,187,99,0.08) 100%);
    opacity: 0.9;
  }

  .exercise-header {
    padding: 16px 16px 12px 18px;
  }

  .exercise-topline {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .exercise-index {
    width: 28px;
    height: 28px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: rgba(201,164,76,0.12);
    border: 1px solid rgba(201,164,76,0.16);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .exercise-title-block {
    min-width: 0;
  }

  .exercise-name {
    font-size: 15px;
    letter-spacing: -0.2px;
  }

  .exercise-submeta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
  }

  .exercise-tools {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 16px 0 18px;
  }

  .ghost-link {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
  }

  .ghost-link:hover { color: var(--text); }

  .sets-table {
    padding: 14px 16px 14px 18px;
  }

  .sets-header {
    margin-bottom: 10px;
    color: #8f83a1;
  }

  .set-row {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 8px;
    margin-bottom: 9px;
  }

  .set-num {
    width: 26px;
    height: 26px;
    border-radius: 9px;
    background: rgba(255,255,255,0.045);
    display: grid;
    place-items: center;
    font-size: 12px;
    margin: 0 auto;
  }

  .set-input {
    height: 42px;
    border-radius: 12px;
    background: rgba(15, 8, 24, 0.78);
    border-color: rgba(255,255,255,0.05);
  }

  .set-check {
    width: 36px;
    height: 36px;
    border-radius: 12px;
  }

  .add-set-btn {
    border-style: solid;
    border-color: rgba(201,164,76,0.14);
    background: rgba(201,164,76,0.08);
    color: #e5c16a;
    height: 42px;
    font-weight: 600;
  }

  .notes-shell {
    padding: 0 16px 16px 18px;
  }

  .notes-input {
    min-height: 72px;
    border-radius: 14px;
    background: rgba(15, 8, 24, 0.74);
    border-color: rgba(255,255,255,0.05);
  }

  .session-preview-card {
    padding: 16px 18px;
  }

  .session-preview-meta {
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 390px) {
    .nav-btn { font-size: 16px; }
    .header-title { font-size: 34px; }
    .finish-btn { font-size: 20px; }
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }


  .dashboard-hero,
  .profile-shell,
  .detail-shell {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%),
      rgba(31, 14, 46, 0.86);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .dashboard-hero {
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .dashboard-hero::after,
  .profile-shell::after,
  .detail-shell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, rgba(201,164,76,0.14), transparent 34%);
    pointer-events: none;
  }

  .dashboard-hero-top,
  .profile-head,
  .detail-head {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(201, 164, 76, 0.12);
    border: 1px solid rgba(201, 164, 76, 0.16);
    padding: 5px 9px;
    border-radius: 999px;
    margin-bottom: 10px;
  }

  .hero-title,
  .profile-name,
  .detail-title {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1.3px;
    line-height: 0.95;
  }

/* === FORJA: ENTRENAMIENTO ACTIVO — VERSION ESTABLE 2026-05-20 === */

/* Regla base: si la pantalla de sesión no está abierta, su botón no aparece */
#sessionScreen:not(.active) .finish-btn {
  display: none !important;
}

#sessionScreen.active .finish-btn {
  display: block;
}

/* Antes de iniciar entrenamiento: NO mostrar Volver/Descartar */
#sessionScreen .session-legacy-actions {
  display: none !important;
}

body.training-active {
  overflow: hidden !important;
}

/* En entrenamiento se oculta navegación, no el temporizador */
body.training-active .nav {
  display: none !important;
}

body.training-active .header {
  display: block !important;
  position: fixed !important;
  inset: 0 0 auto 0 !important;
  width: 100% !important;
  max-width: 480px !important;
  height: 0 !important;
  min-height: 0 !important;
  margin: 0 auto !important;
  padding: 0 !important;
  border: 0 !important;
  background: transparent !important;
  overflow: visible !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  z-index: 3600 !important;
  pointer-events: none !important;
}

body.training-active .brand {
  display: none !important;
}

/* Temporizador visible durante entrenamiento cuando una serie activa el descanso */
body.training-active .timer-wrap {
  display: flex !important;
  position: fixed !important;
  top: calc(env(safe-area-inset-top, 0px) + 10px) !important;
  right: max(12px, calc((100vw - 480px) / 2 + 12px)) !important;
  z-index: 3700 !important;
  align-items: flex-end !important;
  pointer-events: auto !important;
}

body.training-active .rest-timer.visible {
  display: block !important;
}

body.training-active .timer-controls.visible {
  display: flex !important;
}

/* Pantalla de entrenamiento completa, limpia y estable */
body.training-active #sessionScreen.screen.active {
  display: block !important;
  position: fixed !important;
  inset: 0 !important;
  left: 0 !important;
  right: 0 !important;
  transform: none !important;
  width: min(100vw, 480px) !important;
  max-width: 480px !important;
  height: 100dvh !important;
  margin: 0 auto !important;
  padding: 0 0 calc(env(safe-area-inset-bottom, 0px) + 24px) !important;
  z-index: 3000 !important;
  overflow-y: auto !important;
  overscroll-behavior-y: contain !important;
  background:
    radial-gradient(circle at top, rgba(201,164,76,0.05), transparent 26%),
    linear-gradient(180deg, #12051f 0%, #170826 100%) !important;
}

/* Durante entrenamiento: mostrar solo DESCARTAR, pequeño, arriba */
body.training-active #sessionScreen .session-legacy-actions {
  display: flex !important;
  position: sticky !important;
  top: calc(env(safe-area-inset-top, 0px) + 8px) !important;
  z-index: 3500 !important;
  justify-content: flex-start !important;
  align-items: center !important;
  gap: 0 !important;
  margin: 0 !important;
  padding: 8px 12px 0 !important;
  background: transparent !important;
  pointer-events: auto !important;
}

body.training-active #sessionScreen .session-legacy-actions button:first-child {
  display: none !important;
}

body.training-active #sessionScreen .session-legacy-actions button:last-child {
  display: inline-flex !important;
  flex: 0 0 auto !important;
  width: auto !important;
  padding: 8px 12px !important;
  border-radius: 999px !important;
  background: rgba(255, 93, 104, 0.13) !important;
  border: 1px solid rgba(255, 93, 104, 0.35) !important;
  color: #ffd8dc !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  letter-spacing: 0.6px !important;
  line-height: 1 !important;
  box-shadow: none !important;
  transform: none !important;
}

body.training-active .session-header {
  margin: 0 !important;
  padding: 15px 16px 13px !important;
  border: 0 !important;
  border-bottom: 1px solid rgba(255,255,255,0.06) !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

body.training-active .session-title {
  font-size: 34px !important;
  line-height: 0.95 !important;
}

body.training-active .session-date {
  font-size: 11px !important;
}

body.training-active .session-kicker {
  padding: 0 !important;
  margin-bottom: 8px !important;
  border: 0 !important;
  background: transparent !important;
}

body.training-active .session-overview {
  display: none !important;
}

body.training-active .exercise-card.training-card {
  margin: 0 0 10px !important;
  border-left: 0 !important;
  border-right: 0 !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}

body.training-active .training-card::before {
  width: 3px !important;
}

body.training-active .exercise-header,
body.training-active .exercise-tools,
body.training-active .sets-table,
body.training-active .notes-shell {
  padding-left: 16px !important;
  padding-right: 16px !important;
}

body.training-active .analysis-box,
body.training-active .prev-info {
  border-left: 0 !important;
  border-right: 0 !important;
  border-radius: 0 !important;
}

/* Terminar sesión: al final real del entrenamiento, NO flotante */
body.training-active .finish-btn {
  position: static !important;
  left: auto !important;
  right: auto !important;
  bottom: auto !important;
  transform: none !important;
  width: calc(100% - 32px) !important;
  max-width: none !important;
  margin: 24px 16px calc(env(safe-area-inset-bottom, 0px) + 28px) !important;
  padding: 16px !important;
  border-radius: 18px !important;
  background: linear-gradient(180deg, #ddb965 0%, #bc9138 100%) !important;
  color: #140813 !important;
  box-shadow: 0 12px 28px rgba(201,164,76,0.18) !important;
  z-index: auto !important;
}

body.training-active .finish-btn:active {
  transform: scale(0.985) !important;
}

body.training-active .finish-btn::before,
body.training-active .finish-btn::after {
  display: none !important;
}

function cloneData(value) {
  return JSON.parse(JSON.stringify(value));
}

function normalizeText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .trim();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function getRoutinesLocal() {

  }
  return cloneData(DEFAULT_ROUTINES);
}

function getTodayRoutine() {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const today = days[new Date().getDay()];
  return ROUTINES.find(r => normalizeText(r.day) === normalizeText(today)) || null;
}

function getRoutineById(routineId) {
  return ROUTINES.find(r => r.id === routineId) || null;
}

function getValidSets(sets) {
  return (sets || []).filter(s => {
    const weight = parseFloat(s.weight);
    const reps = parseFloat(s.reps);
    return (s.done || s.weight || s.reps) && !Number.isNaN(weight) && !Number.isNaN(reps) && reps > 0;
  });
}

function getTotalReps(sets) {
  return getValidSets(sets).reduce((sum, s) => sum + (parseFloat(s.reps) || 0), 0);
}

function getVolume(sets) {
  return getValidSets(sets).reduce((sum, s) => sum + ((parseFloat(s.weight) || 0) * (parseFloat(s.reps) || 0)), 0);
}

function getBestSet(sets) {
  const valid = getValidSets(sets);
  if (!valid.length) return null;
  return valid.reduce((best, s) => {
    const score = (parseFloat(s.weight) || 0) * (parseFloat(s.reps) || 0);
    const bestScore = (parseFloat(best.weight) || 0) * (parseFloat(best.reps) || 0);
    return score > bestScore ? s : best;
  }, valid[0]);
}

function getExerciseInsight(lastEx, currentEx) {
  if (!lastEx) {
    return `
      <div class="analysis-box">
        <div class="analysis-title">Objetivo de hoy</div>
        <div class="analysis-text">Primer registro de este ejercicio. Usa un peso controlable, deja 1–2 repeticiones en reserva y guarda datos limpios.</div>
      </div>
    `;
  }

  const lastSets = getValidSets(lastEx.sets);
  if (!lastSets.length) {
    return `
      <div class="analysis-box">
        <div class="analysis-title">Objetivo de hoy</div>
        <div class="analysis-text">La sesión anterior no tiene series completas confiables. Registra peso y repeticiones reales antes de buscar subir carga.</div>
      </div>
    `;
  }

  const lastReps = getTotalReps(lastEx.sets);
  const lastVolume = Math.round(getVolume(lastEx.sets));
  const best = getBestSet(lastEx.sets);
  const targetReps = lastReps + 1;
  const bestText = best ? `${best.weight} lb × ${best.reps}` : 'sin mejor serie';

  return `
    <div class="analysis-box">
      <div class="analysis-title">Objetivo de hoy</div>
      <div class="analysis-text">
        Anterior: ${lastSets.length} series, ${lastReps} repeticiones totales, ${lastVolume.toLocaleString()} lb de volumen. Mejor serie: ${bestText}.<br>
        Hoy intenta mínimo ${targetReps} repeticiones totales con técnica limpia. Sube peso solo si completas todas las series sin perder control.
      </div>
    </div>
  `;
}

function stripCloudMeta(session) {
  if (!session) return session;
  const copy = JSON.parse(JSON.stringify(session));
  delete copy._cloudId;
  return copy;
}

function sessionKey(session) {
  return `${session.routineName}__${session.date}`;
}

function dedupeSessions(sessions) {
  const map = new Map();
  for (const session of sessions || []) {
    if (!session || !session.routineName || !session.date) continue;
    const key = sessionKey(session);
    if (!map.has(key)) map.set(key, session);
  }
  return Array.from(map.values()).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getSessionsLocal() {

}

async function loadCloudSessions() {

  cloudSessions = dedupeSessions((data || []).map(row => ({

    _cloudId: row.id,
    routineId: row.data_json?.routineId || row.routine_id,
    routineName: row.data_json?.routineName || row.routine_name,
    date: row.data_json?.date || row.date,
  })));

  return cloudSessions;
}

async function syncLocalSessionsToCloud() {
  if (!currentUser) return true;

  const localSessions = dedupeSessions(getSessionsLocal());

  const { data: existingRows, error: fetchError } = await supabaseClient
    .from('sessions')
    .select('id, routine_name, date')
    .eq('user_id', currentUser.id);

  if (fetchError) {
    console.error('syncLocalSessionsToCloud', fetchError);
    showToast('❌ ' + fetchError.message);
    await loadCloudSessions();
    return false;
  }

  const existingKeys = new Set(
    (existingRows || []).map(row => `${row.routine_name}__${row.date}`)
  );

  const rows = localSessions
    .filter(session => !existingKeys.has(sessionKey(session)))
    .map(session => ({
      user_id: currentUser.id,
      routine_id: session.routineId,
      routine_name: session.routineName,
      date: session.date,
      data_json: stripCloudMeta(session),
    }));

  if (rows.length) {
    const { error } = await supabaseClient.from('sessions').insert(rows);
    if (error) {
      console.error('syncLocalSessionsToCloud insert', error);
      showToast('❌ ' + error.message);
      await loadCloudSessions();
      return false;
    }
  }

  await loadCloudSessions();
  setSessionsLocal(dedupeSessions([...(cloudSessions || []), ...localSessions]));
  return true;
}

async function saveSession(session) {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return false;
  }

  const cleanSession = stripCloudMeta(session);
  const localSessions = dedupeSessions([cleanSession, ...getSessionsLocal()]);
  setSessionsLocal(localSessions);

  const { data: existing, error: checkError } = await supabaseClient
    .from('sessions')
    .select('id')
    .eq('user_id', currentUser.id)
    .eq('routine_name', cleanSession.routineName)
    .eq('date', cleanSession.date)
    .limit(1);

  if (checkError) {
    console.error('saveSession check', checkError);
    showToast('❌ ' + checkError.message);
    return false;
  }

  if (existing && existing.length > 0) {
    const existingId = existing[0].id;
    const { error } = await supabaseClient
      .from('sessions')
      .update({
        routine_id: cleanSession.routineId,
        routine_name: cleanSession.routineName,
        date: cleanSession.date,
        data_json: cleanSession,
      })
      .eq('user_id', currentUser.id)
      .eq('id', existingId);

    if (error) {
      console.error('saveSession update', error);
      showToast('❌ ' + error.message);
      return false;
    }

    cloudSessions = cloudSessions.filter(s => !(s.routineName === cleanSession.routineName && s.date === cleanSession.date));
    cloudSessions.unshift({ ...cleanSession, _cloudId: existingId });
  } else {
    const { data, error } = await supabaseClient
      .from('sessions')
      .insert({
        user_id: currentUser.id,
        routine_id: cleanSession.routineId,
        routine_name: cleanSession.routineName,
        date: cleanSession.date,
        data_json: cleanSession,
      })
      .select('id')
      .single();

    if (error) {
      console.error('saveSession insert', error);
      showToast('❌ ' + error.message);
      return false;
    }

    cloudSessions.unshift({ ...cleanSession, _cloudId: data.id });
  }

  cloudSessions = dedupeSessions(cloudSessions);
  setSessionsLocal(dedupeSessions(cloudSessions));
  return true;
}

function makeSessionRef(session) {

    cloudId: session?._cloudId || null,
    routineName: session?.routineName || '',

function sameSessionRef(session, ref) {

async function updateSavedSession(originalRef, updatedSession) {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return false;
  }

  const cleanSession = stripCloudMeta(updatedSession);

  let query = supabaseClient
    .from('sessions')
    .update({
      routine_id: cleanSession.routineId,
      routine_name: cleanSession.routineName,
      date: cleanSession.date,
      data_json: cleanSession,
    })
    .eq('user_id', currentUser.id);

  if (originalRef?.cloudId) {
    query = query.eq('id', originalRef.cloudId);
  } else {
    query = query.eq('routine_name', originalRef.routineName).eq('date', originalRef.date);
  }

  const { error } = await query;

  if (error) {
    console.error('updateSavedSession', error);
    showToast('❌ ' + error.message);
    return false;
  }

  const localSessions = getSessionsLocal().filter(s => !sameSessionRef(s, originalRef));
  setSessionsLocal(dedupeSessions([cleanSession, ...localSessions]));

  await loadCloudSessions();
  setSessionsLocal(dedupeSessions(cloudSessions));
  return true;
}

function toDateInputValue(iso) {
  const d = new Date(iso);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function fromDateInputValue(value, originalIso) {
  const parts = String(value || '').split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return originalIso || new Date().toISOString();
  const old = originalIso ? new Date(originalIso) : new Date();
  const hour = Number.isNaN(old.getHours()) ? 12 : old.getHours();
  const minute = Number.isNaN(old.getMinutes()) ? 0 : old.getMinutes();
  const second = Number.isNaN(old.getSeconds()) ? 0 : old.getSeconds();
  return new Date(parts[0], parts[1] - 1, parts[2], hour, minute, second).toISOString();
}

function getYesterdayInputValue() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return toDateInputValue(d.toISOString());
}

  if (!session || !input || !input.value) return;

  const updated = cloneData(stripCloudMeta(session));
  updated.date = fromDateInputValue(input.value, session.date);

  const ok = await updateSavedSession(makeSessionRef(session), updated);
  if (!ok) return;

  closeDateEditOverlay();
  renderHome();
  renderHistory();
  showToast('✅ Fecha actualizada');
}

      </div>

    const exercises = rawExercises.map(line => {
      const parts = line.split('|').map(part => part.trim());

      const sets = Math.max(1, parseInt(parts[1], 10) || 3);
      const note = parts[2] || '';
      return { name: exName, sets, ...(note ? { note } : {}) };

    saveRoutinesLocal();

function enterTrainingMode() {
  document.body.classList.add('training-active');
  setupTrainingSwipeToHide();
}

function exitTrainingMode() {
  document.body.classList.remove('training-active');
}

let trainingSwipeStartY = 0;
let trainingSwipeStartX = 0;
let trainingSwipeStartedAtTop = false;

function setupTrainingSwipeToHide() {
  const screen = document.getElementById('sessionScreen');
  if (!screen || screen.dataset.trainingSwipeReady === '1') return;
  screen.dataset.trainingSwipeReady = '1';

  screen.addEventListener('touchstart', event => {
    if (!document.body.classList.contains('training-active') || !currentSession) return;
    const touch = event.touches[0];
    trainingSwipeStartY = touch.clientY;
    trainingSwipeStartX = touch.clientX;
    trainingSwipeStartedAtTop = screen.scrollTop <= 8;
  }, { passive: true });

  screen.addEventListener('touchend', event => {
    if (!document.body.classList.contains('training-active') || !currentSession) return;
    const touch = event.changedTouches[0];
    const deltaY = touch.clientY - trainingSwipeStartY;
    const deltaX = Math.abs(touch.clientX - trainingSwipeStartX);

    if (trainingSwipeStartedAtTop && deltaY > 80 && deltaX < 90) {
      goBack();
    }
  }, { passive: true });
}

function showScreen(name) {
  if (!currentUser && name !== 'auth') {
    name = 'auth';
    showToast('🔒 Inicia sesión primero');
  }

  const goingToSession = name === 'session';

  if (currentSession && !goingToSession) {
    if (!editingSessionKey) saveCurrentDraft();
    stopTimer();
  }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  const targetScreen = document.getElementById(name + 'Screen');
  if (targetScreen) targetScreen.classList.add('active');

  if (name === 'session' && currentSession) enterTrainingMode();
  else exitTrainingMode();

  const navMap = { home: 0, history: 1, profile: 2, auth: 3 };
  if (navMap[name] !== undefined) {
    document.querySelectorAll('.nav-btn')[navMap[name]].classList.add('active');
  }

  if (name === 'history') renderHistory();
  if (name === 'home') renderHome();
  if (name === 'profile') renderProfile();
  if (name === 'auth') renderAuthStatus();
}

function discardSession() {
  if (editingSessionKey) {
    currentSession = null;
    editingSessionKey = null;
    clearCurrentDraft();
    stopTimer();
    showScreen('history');
    return;
  }

  if (confirm('¿Descartar entrenamiento?')) {
    currentSession = null;
    clearCurrentDraft();
    stopTimer();
    showScreen('home');
  }
}

function goBack() {
  if (editingSessionKey) {
    currentSession = null;
    editingSessionKey = null;
    clearCurrentDraft();
    stopTimer();
    showScreen('history');
    return;
  }

  if (currentSession) {
    saveCurrentDraft();
    stopTimer();
    showToast('✅ Sesión guardada como borrador');
  }
  showScreen('home');
}

function startSession(routineId) {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return;
  }

  editingSessionKey = null;
  const routine = getRoutineById(routineId);
  if (!routine) { showToast('⚠️ Rutina no encontrada'); return; }

  const existingDraft = currentSession || getCurrentDraft();
  if (existingDraft) {
    const replace = confirm('Ya hay una sesión guardada. ¿Reemplazarla por una nueva sesión de ' + routine.name + '?');
    if (!replace) return;
    clearCurrentDraft();
    stopTimer();
  } else if (!confirm('¿Iniciar sesión de ' + routine.name + '?')) {
    return;
  }

  currentSession = {
    routineId,
    routineName: routine.name,
    date: new Date().toISOString(),
    exercises: routine.exercises.map(ex => {
      const lastEx = getLastExerciseData(routineId, ex.name);
      return {
        name: ex.name,
        originalName: ex.name,
        note: ex.note || null,
        replaced: false,
        sets: Array.from({ length: ex.sets }, (_, i) => {
          const lastSet = lastEx?.sets?.[i];
          return { weight: lastSet?.weight || '', reps: lastSet?.reps || '', done: false };
        })
      };
    })
  };

  saveCurrentDraft();
  document.getElementById('sessionTitle').textContent = routine.name.toUpperCase();
  document.getElementById('sessionDate').innerHTML = `<span class="session-kicker">Sesión en curso</span><div>${formatDateFull(new Date())}</div>`;
  renderExercises();

  document.querySelector('.finish-btn').textContent = 'TERMINAR SESIÓN';
  document.querySelector('.finish-btn').onclick = () => finishSession();

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('sessionScreen').classList.add('active');
  enterTrainingMode();
}

  saveCurrentDraft();
  renderExercises();
}

async function finishSession() {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return;
  }

  if (!currentSession) {
    showToast('⚠️ No hay una sesión activa');
    return;
  }

  const doneSets = currentSession.exercises.reduce((acc, ex) => acc + ex.sets.filter(s => s.done).length, 0);
  if (doneSets === 0) {
    showToast('⚠️ Marca al menos una serie como completada');
    return;
  }

  const wasEditing = !!editingSessionKey;
  const ok = wasEditing
    ? await updateSavedSession(editingSessionKey, currentSession)
    : await saveSession(currentSession);
  if (ok === false) return;

  currentSession = null;
  editingSessionKey = null;
  clearCurrentDraft();
  stopTimer();
  exitTrainingMode();
  showToast(wasEditing ? '✅ Cambios guardados' : '✅ Sesión guardada');
  const finishBtn = document.querySelector('.finish-btn');
  finishBtn.textContent = 'TERMINAR SESIÓN';
  finishBtn.onclick = () => finishSession();
  renderHome();
  renderHistory();
  setTimeout(() => { showScreen(wasEditing ? 'history' : 'home'); }, 900);
}

    return;

  const totalSets = sessions.reduce((acc, s) => acc + s.exercises.reduce((sum, ex) => sum + ex.sets.filter(st => st.done).length, 0), 0);
  const totalVolume = sessions.reduce((acc, s) => acc + s.exercises.reduce((sum, ex) => sum + ex.sets.filter(st => st.done).reduce((a, st) => a + (parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0), 0), 0), 0);

  list.innerHTML = `
    <div class="history-summary-grid">
      <div class="history-summary-card"><div class="history-summary-label">Sesiones</div><div class="history-summary-value">${sessions.length}</div></div>

      const doneSets = s.exercises.reduce((acc, ex) => acc + ex.sets.filter(st => st.done).length, 0);
      const volume = s.exercises.reduce((acc, ex) => acc + ex.sets.filter(st => st.done).reduce((a, st) => a + (parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0), 0), 0);
      return `
        <div class="history-card session-compact clean-history-card"

async function deleteSession(index) {
  const sessions = getSessions();
  const session = sessions[index];
  if (!confirm('¿Eliminar esta sesión del historial?')) return;

  const localSessions = getSessionsLocal().filter(s => !(s.routineName === session.routineName && s.date === session.date));
  setSessionsLocal(localSessions);

  if (currentUser) {
    const { error } = await supabaseClient
      .from('sessions')
      .delete()
      .eq('user_id', currentUser.id)
      .eq('routine_name', session.routineName)
      .eq('date', session.date);

    if (error) {
      console.error('deleteSession', error);
      showToast('❌ ' + error.message);
      return;
    }

    cloudSessions = cloudSessions.filter(s => !(s.routineName === session.routineName && s.date === session.date));
  }

  renderHome();
  renderHistory();
  showToast('🗑️ Sesión eliminada');
}

let forjaAudioReady = false;
let forjaLastUnlockTry = 0;

function unlockTimerAudio() {
  try {
    const nowMs = Date.now();
    if (forjaAudioReady && nowMs - forjaLastUnlockTry < 3000) return;
    forjaLastUnlockTry = nowMs;

    if (!audioCtx) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (AudioContextClass) audioCtx = new AudioContextClass();
    }

    if (!audioCtx) return;

    const finishUnlock = () => {
      try {
        /* Pulso casi silencioso: ayuda a iPhone a desbloquear Web Audio desde un toque real. */
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.00001, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.035);
        forjaAudioReady = true;
      } catch (e) {
        console.warn('finishUnlock', e);
      }
    };

    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(finishUnlock).catch(() => {});
    } else if (audioCtx.state === 'running') {
      finishUnlock();
    }
  } catch (e) {
    console.warn('unlockTimerAudio', e);
  }
}

function forjaAlarmTone(freq, delay, duration, volume) {
  if (!audioCtx || audioCtx.state !== 'running') return;

  const startAt = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'square';
  osc.frequency.setValueAtTime(freq, startAt);

  gain.gain.setValueAtTime(0.0001, startAt);
  gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startAt);
  osc.stop(startAt + duration + 0.04);
}

function playTimerBeep() {
  unlockTimerAudio();

  if (!audioCtx || audioCtx.state !== 'running') {
    showToast('🔕 Toca la pantalla y sube el volumen');
    return;
  }

  /* Alarma fuerte en dos ráfagas. */
  forjaAlarmTone(880, 0.00, 0.22, 0.42);
  forjaAlarmTone(1175, 0.28, 0.22, 0.42);
  forjaAlarmTone(1568, 0.56, 0.38, 0.48);
  forjaAlarmTone(880, 1.08, 0.22, 0.42);
  forjaAlarmTone(1175, 1.36, 0.22, 0.42);
  forjaAlarmTone(1568, 1.64, 0.48, 0.52);

  if (navigator.vibrate) {
    navigator.vibrate([300, 120, 300, 120, 500]);
  }
}

function handleTimerTick() {
  if (!timerEndTime) return;
  const remainingMs = timerEndTime - Date.now();
  if (remainingMs <= 0) {
    stopTimer();
    playTimerBeep();
    showToast('⏱ Descanso terminado — siguiente serie');
  } else {
    updateTimerDisplay();
  }
}

function startTimer(seconds) {
  stopTimer();
  unlockTimerAudio();
  timerPausedRemainingMs = null;
  timerEndTime = Date.now() + (seconds * 1000);
  const el = document.getElementById('timerDisplay');
  const controls = document.getElementById('timerControls');
  const pauseBtn = document.getElementById('timerPauseBtn');
  if (pauseBtn) pauseBtn.textContent = 'Pausar';
  if (el) el.classList.add('visible');
  if (controls) controls.classList.add('visible');
  updateTimerDisplay();
  timerInterval = setInterval(handleTimerTick, 250);
}

['touchstart', 'pointerdown', 'click'].forEach(type => {
  document.addEventListener(type, unlockTimerAudio, { passive: true });
});

function adjustTimer(seconds) {
  if (!timerEndTime && timerPausedRemainingMs === null) return;
  if (timerPausedRemainingMs !== null) {
    timerPausedRemainingMs = Math.max(0, timerPausedRemainingMs + (seconds * 1000));
  } else {
    timerEndTime = Math.max(Date.now(), timerEndTime + (seconds * 1000));
  }
  updateTimerDisplay();
}

function toggleTimerPause() {
  if (!timerEndTime && timerPausedRemainingMs === null) return;
  const pauseBtn = document.getElementById('timerPauseBtn');

  if (timerPausedRemainingMs !== null) {
    timerEndTime = Date.now() + timerPausedRemainingMs;
    timerPausedRemainingMs = null;
    clearInterval(timerInterval);
    timerInterval = setInterval(handleTimerTick, 250);
    if (pauseBtn) pauseBtn.textContent = 'Pausar';
  } else {
    timerPausedRemainingMs = Math.max(timerEndTime - Date.now(), 0);
    clearInterval(timerInterval);
    timerInterval = null;
    timerEndTime = null;
    if (pauseBtn) pauseBtn.textContent = 'Seguir';
  }

  updateTimerDisplay();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerEndTime = null;
  timerPausedRemainingMs = null;
  const el = document.getElementById('timerDisplay');
  const controls = document.getElementById('timerControls');
  if (el) el.classList.remove('visible');
  if (controls) controls.classList.remove('visible');
}

function updateTimerDisplay() {
  const remainingMs = timerPausedRemainingMs !== null
    ? timerPausedRemainingMs
    : (timerEndTime ? Math.max(timerEndTime - Date.now(), 0) : 0);
  const totalSeconds = Math.ceil(remainingMs / 1000);
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

function getSummary(sets) {
  const done = sets.filter(s => s.done || s.weight);
  if (!done.length) return 'Sin datos';
  const w = done[0].weight;
  const avgR = Math.round(done.reduce((a, s) => a + (parseFloat(s.reps) || 0), 0) / done.length);
  return `${done.length} series · ${w} lbs · ~${avgR} reps`;
}

function formatDate(iso) {
  const d = new Date(iso);
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function formatDateFull(d) {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]} ${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}


function formatDateForFile(iso) {
  const d = new Date(iso);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function safeFileName(text) {
  return String(text || 'forja')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'forja';
}

function getCompletedSets(exercise) {
  return (exercise.sets || []).filter(st => st.done);
}

function getSessionTotals(session) {
  const doneSets = session.exercises.reduce((acc, ex) => acc + getCompletedSets(ex).length, 0);
  const totalReps = session.exercises.reduce((acc, ex) => {
    return acc + getCompletedSets(ex).reduce((sum, st) => sum + (parseFloat(st.reps) || 0), 0);
  }, 0);
  const totalVolume = session.exercises.reduce((acc, ex) => {
    return acc + getCompletedSets(ex).reduce((sum, st) => {
      return sum + ((parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0));
    }, 0);
  }, 0);
  return { doneSets, totalReps, totalVolume, exercises: session.exercises.length };
}

function formatExerciseTxt(exercise) {
  const lines = [];
  const done = getCompletedSets(exercise);
  lines.push(exercise.name);

  if (!done.length) {
    lines.push('Sin series completadas.');
  } else {
    done.forEach((st, i) => {
      const weight = st.weight || '--';
      const reps = st.reps || '--';
      lines.push(`Serie ${i + 1}: ${weight} lb x ${reps} reps`);
    });
  }

  if (exercise.replaced && exercise.originalName) lines.push(`Sustituye a: ${exercise.originalName}`);
  if (exercise.notes) lines.push(`Notas: ${exercise.notes}`);
  return lines.join('\n');
}

function formatSessionTxt(session) {
  const totals = getSessionTotals(session);
  const lines = [];

  lines.push(session.routineName.toUpperCase());
  lines.push(formatDateFull(new Date(session.date)));
  lines.push('');
  lines.push(`Series completadas: ${totals.doneSets}`);
  lines.push(`Repeticiones totales: ${totals.totalReps}`);
  lines.push(`Volumen total: ${Math.round(totals.totalVolume).toLocaleString()} lb`);
  lines.push('');

  session.exercises.forEach((ex, i) => {
    lines.push(`EJERCICIO ${i + 1}`);
    lines.push(formatExerciseTxt(ex));
    lines.push('');
  });

  return lines.join('\n').trim();
}

function formatSessionCsv(session) {
  const rows = [['fecha','rutina','ejercicio','serie','peso_lb','repeticiones','volumen_lb','sustituye_a','notas']];

  session.exercises.forEach(ex => {
    getCompletedSets(ex).forEach((set, index) => {
      const weight = parseFloat(set.weight) || 0;
      const reps = parseFloat(set.reps) || 0;
      rows.push([
        formatDateForFile(session.date),
        session.routineName,
        ex.name,
        index + 1,
        set.weight || '',
        set.reps || '',
        weight * reps,
        ex.replaced ? (ex.originalName || '') : '',
        ex.notes || ''
      ]);
    });
  });

  return rows.map(row => row.map(csvEscape).join(',')).join('\n');
}

function formatCompactSession(session) {
  const totals = getSessionTotals(session);
  const lines = [];

  lines.push(`${session.routineName} — ${formatDateFull(new Date(session.date))}`);
  lines.push(`Resumen: ${totals.doneSets} series, ${totals.totalReps} reps, ${Math.round(totals.totalVolume).toLocaleString()} lb de volumen.`);
  lines.push('');

  session.exercises.forEach(ex => {
    const done = getCompletedSets(ex);
    const setsText = done.length
      ? done.map(st => `${st.weight || '--'} lb x ${st.reps || '--'}`).join(' | ')
      : 'sin series completadas';
    lines.push(`${ex.name}: ${setsText}`);
    if (ex.replaced && ex.originalName) lines.push(`Sustituye a: ${ex.originalName}`);
    if (ex.notes) lines.push(`Notas: ${ex.notes}`);
  });

  return lines.join('\n');
}

function formatAnalysisTxt(session) {
  const lines = [];

  lines.push('ANALIZA MI ENTRENAMIENTO');
  lines.push('');
  lines.push(`Rutina: ${session.routineName}`);
  lines.push(`Fecha: ${formatDateFull(new Date(session.date))}`);
  lines.push('Objetivo: ganar músculo, progresar sin sacrificar técnica.');
  lines.push('');
  lines.push('ENTRENAMIENTO ACTUAL:');
  lines.push(formatCompactSession(session));
  lines.push('');
  lines.push('Usa el historial que ya te he compartido en esta conversación. No incluyo sesión anterior para evitar duplicar datos.');
  lines.push('');
  lines.push('Dime exactamente:');
  lines.push('1. dónde progresé');
  lines.push('2. dónde bajé rendimiento');
  lines.push('3. qué debo intentar la próxima vez');
  lines.push('4. si debo subir, mantener o bajar peso en cada ejercicio');
  lines.push('5. qué correcciones técnicas debo cuidar');

  return lines.join('\n');
}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType || 'text/plain;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function copyTextToClipboard(text, successMessage, fallbackFilename) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (!ok) throw new Error('Copia bloqueada');
    }
    showToast(successMessage || '✅ Copiado');
  } catch (error) {
    console.warn('copyTextToClipboard', error);
    downloadTextFile(fallbackFilename || 'forja-entrenamiento.txt', text, 'text/plain;charset=utf-8;');
    showToast('⚠️ No se pudo copiar; descargué TXT');
  }
}

function csvEscape(value) {
  const text = String(value ?? '');
  return /[",\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
}

function exportSessionsCsv() {

  const rows = [['fecha','rutina','ejercicio','serie','peso_lb','repeticiones','volumen_lb','sustituye_a','notas']];
  sessions.map(stripCloudMeta).forEach(session => {
    session.exercises.forEach(ex => {
      ex.sets.forEach((set, index) => {
        if (!set.done && !set.weight && !set.reps) return;
        const weight = parseFloat(set.weight) || 0;
        const reps = parseFloat(set.reps) || 0;
        rows.push([
          session.date,
          session.routineName,
          ex.name,
          index + 1,
          set.weight || '',
          set.reps || '',
          weight * reps,
          ex.replaced ? (ex.originalName || '') : '',
          ex.notes || ''
        ]);
      });
    });
  });

  const csv = rows.map(row => row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const yyyy = today.getFullYear();

  const dd = String(today.getDate()).padStart(2, '0');

  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSV exportado');
}

  align-items:center!important;
  gap:18px!important;
  cursor:pointer!important;
}
.routine-card:active,.history-card:active,.dashboard-hero:active{transform:scale(.988)!important;border-color:rgba(240,215,138,.32)!important;}
.routine-emoji.routine-mark,.history-symbol{
  width:60px!important;height:60px!important;min-width:60px!important;border-radius:20px!important;display:grid!important;place-items:center!important;
  font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif!important;font-size:31px!important;line-height:1!important;letter-spacing:0!important;color:initial!important;
  background:rgba(255,244,212,.075)!important;border:1px solid rgba(226,194,125,.18)!important;
  box-shadow:inset 0 1px 0 rgba(255,245,214,.14),0 12px 24px rgba(0,0,0,.20)!important;text-shadow:none!important;
}
.routine-info,.history-clean-main{min-width:0!important;}
.routine-name,.history-name{
  margin:0 0 8px!important;color:var(--fg-text)!important;font-size:24px!important;line-height:1.10!important;font-weight:850!important;letter-spacing:-.025em!important;
}
.routine-meta{color:var(--fg-muted)!important;font-size:16px!important;line-height:1.35!important;}
.forja-day-pill{color:var(--fg-gold2)!important;font-weight:900!important;font-size:18px!important;white-space:nowrap!important;align-self:start!important;padding-top:4px!important;}
.history-card{min-height:150px!important;padding:24px!important;cursor:pointer!important;}
.history-clean-top{display:grid!important;grid-template-columns:64px minmax(0,1fr) auto!important;align-items:start!important;gap:18px!important;margin:0!important;}
.history-date-clean{color:var(--fg-gold2)!important;font-weight:850!important;font-size:17px!important;white-space:nowrap!important;padding-top:3px!important;}
.forja-history-details{margin-top:18px!important;padding-top:0!important;border-top:0!important;display:flex!important;flex-wrap:wrap!important;gap:10px 18px!important;}
.history-toolbar-clean{margin-bottom:20px!important;}
/* sin botones/cajas dentro del inicio e historial */
.routine-inline-actions,.today-card,.today-card .mini-actions,.history-export-btn,.session-more-btn,.history-summary-grid,.history-stats,.history-compact-stats,.day-badge,.hero-badge,.hero-grid,.hero-stat,.profile-badge,.detail-badge,.history-date-badge,.clean-history-card button,.clean-home button:not(.nav-btn){display:none!important;}
/* navegación inferior estable */
.nav{
  display:grid!important;grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:7px!important;
  position:fixed!important;left:50%!important;right:auto!important;top:auto!important;bottom:calc(18px + env(safe-area-inset-bottom,0px))!important;transform:translateX(-50%)!important;
  width:calc(100% - 32px)!important;max-width:448px!important;margin:0!important;padding:7px!important;z-index:9000!important;border-radius:28px!important;
  background:rgba(15,4,27,.74)!important;border:1px solid rgba(226,194,125,.16)!important;
  box-shadow:0 18px 46px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,245,214,.10)!important;
  -webkit-backdrop-filter:blur(32px) saturate(1.25)!important;backdrop-filter:blur(32px) saturate(1.25)!important;
}
.nav-btn{display:flex!important;align-items:center!important;justify-content:center!important;height:50px!important;padding:0 6px!important;border-radius:20px!important;font-family:'DM Sans',sans-serif!important;font-size:14px!important;font-weight:800!important;letter-spacing:-.02em!important;text-transform:none!important;color:rgba(204,193,216,.62)!important;background:transparent!important;border:0!important;}
.nav-btn.active{color:#130515!important;background:linear-gradient(180deg,#f1da8f 0%,#d5af57 58%,#bd9138 100%)!important;border:1px solid rgba(255,255,255,.44)!important;box-shadow:0 12px 26px rgba(217,183,100,.23),inset 0 1px 0 rgba(255,255,255,.50)!important;}
/* sesión: controles necesarios sí visibles */
#sessionScreen .mini-actions,#detailScreen .mini-actions,#profileScreen .mini-actions,#authScreen .mini-actions,.edit-overlay .mini-actions,#sessionScreen .session-legacy-actions{display:flex!important;}
body.training-active .nav{display:none!important;}
body.training-active #sessionScreen.screen.active{height:100dvh!important;padding:0 0 calc(24px + env(safe-area-inset-bottom,0px))!important;}
@media(max-width:390px){
  .screen{padding-left:18px!important;padding-right:18px!important;}
  .header{padding:26px 20px 16px!important;}
  .header-title{font-size:36px!important;}
  .dashboard-hero{padding:25px 22px!important;min-height:156px!important;}
  .hero-title{font-size:36px!important;}
  .routine-card{grid-template-columns:58px minmax(0,1fr) auto!important;min-height:144px!important;padding:23px 20px!important;gap:16px!important;}
  .history-card{padding:22px 20px!important;}
  .history-clean-top{grid-template-columns:58px minmax(0,1fr) auto!important;gap:15px!important;}
  .routine-name,.history-name{font-size:22px!important;}
  .routine-meta{font-size:15px!important;}
  .routine-emoji.routine-mark,.history-symbol{width:54px!important;height:54px!important;min-width:54px!important;font-size:28px!important;}
  .forja-day-pill{font-size:16px!important;}
  .nav{width:calc(100% - 26px)!important;}
  .nav-btn{font-size:13px!important;}
}
</style>
<script id="forja-urgente-final-js">
(function(){
  function safe(s){ return (typeof escapeHtml === 'function') ? escapeHtml(String(s ?? '')) : String(s ?? ''); }
  function fmt(d){ return (typeof formatDate === 'function') ? formatDate(d) : ''; }
  function routineEmoji(r){ return (r && r.emoji) ? r.emoji : '🏋️'; }
  function routineBySession(s){
    var byId = (typeof getRoutineById === 'function' && s.routineId) ? getRoutineById(s.routineId) : null;
    var byName = (typeof ROUTINES !== 'undefined') ? ROUTINES.find(function(r){ return r.name === s.routineName; }) : null;
    return byId || byName || null;
  }
  function emojiBySession(s){ var r = routineBySession(s); return (r && r.emoji) || '🏋️'; }
  function dayShort(day){ return String(day || '').slice(0,3).toUpperCase(); }
  function jsId(id){ return String(id || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

  window.renderHome = function(){
    var grid = document.getElementById('routineGrid');
    if (!grid || typeof ROUTINES === 'undefined') return;
    var sessions = (typeof getSessions === 'function') ? getSessions() : [];
    var totalSessions = sessions.length;
    var completedSets = sessions.reduce(function(acc,s){ return acc + s.exercises.reduce(function(sum,ex){ return sum + ex.sets.filter(function(st){ return st.done; }).length; },0); },0);
    var latest = sessions[0];
    var todayRoutine = (typeof getTodayRoutine === 'function') ? getTodayRoutine() : null;
    var draft = (typeof currentSession !== 'undefined' && currentSession) ? currentSession : ((typeof getCurrentDraft === 'function') ? getCurrentDraft() : null);
    var draftSavedAt = (typeof getDraftSavedAt === 'function') ? getDraftSavedAt() : null;

    var draftCard = draft ? `
      <div class="draft-card tap-card" onclick="resumeSavedSession()">
        <div class="routine-name">Sesión guardada</div>
        <div class="routine-meta">${safe(draft.routineName)} sin terminar${draftSavedAt ? ` · ${fmt(draftSavedAt)}` : ''}</div>
      </div>` : '';

    grid.innerHTML = `
      <div class="dashboard-hero tap-card" ${todayRoutine ? `onclick="startSession('${jsId(todayRoutine.id)}')"` : ''}>
        <div class="eyebrow">FORJA</div>
        <div class="hero-title">${todayRoutine ? 'Hoy toca ' + safe(todayRoutine.name) : 'Cuerpo en construcción'}</div>
        <div class="hero-sub">${todayRoutine ? safe(todayRoutine.desc || 'Rutina programada para hoy.') : 'Bitácora de entrenamiento, progreso y disciplina.'}</div>
        <div class="forja-hero-line"><strong>${totalSessions}</strong> sesiones · <strong>${completedSets}</strong> series hechas · última: <strong>${latest ? fmt(latest.date) : 'sin registro'}</strong></div>
      </div>
      ${draftCard}
      ${ROUTINES.map(function(r){
        var last = sessions.find(function(s){ return s.routineId === r.id; }) || null;
        var lastText = last ? fmt(last.date) : 'sin sesiones';
        var totalSets = r.exercises.reduce(function(acc,ex){ return acc + ex.sets; },0);
        return `
          <div class="routine-card tap-card" onclick="startSession('${jsId(r.id)}')">
            <div class="routine-emoji routine-mark">${safe(routineEmoji(r))}</div>
            <div class="routine-info">
              <div class="routine-name">${safe(r.name)}</div>
              <div class="routine-meta">${safe(r.desc || '')}</div>
              <div class="forja-card-line"><strong>${totalSets}</strong> series · última: ${lastText}</div>
            </div>
            <div class="forja-day-pill">${safe(dayShort(r.day))}</div>
          </div>`;
      }).join('')}`;
  };

  window.renderHistory = function(){
    var sessions = (typeof getSessions === 'function') ? getSessions() : [];
    var list = document.getElementById('historyList');
    if (!list) return;
    if (sessions.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sin sesiones registradas.<br>Toca una rutina para empezar.</div></div>';
      return;
    }
    list.innerHTML = sessions.map(function(s,i){
      var doneSets = s.exercises.reduce(function(acc,ex){ return acc + ex.sets.filter(function(st){ return st.done; }).length; },0);
      var volume = s.exercises.reduce(function(acc,ex){ return acc + ex.sets.filter(function(st){ return st.done; }).reduce(function(a,st){ return a + (parseFloat(st.weight)||0) * (parseFloat(st.reps)||0); },0); },0);
      return `
        <div class="history-card clean-history-card"
          onclick="if(!window.__forjaLongPressDone){showDetail(${i})} window.__forjaLongPressDone=false;"
          oncontextmenu="event.preventDefault(); openSessionActions(${i});"
          onpointerdown="forjaStartLongPress(event, ${i})"
          onpointerup="forjaEndLongPress()"
          onpointerleave="forjaEndLongPress()"
          onpointercancel="forjaEndLongPress()">
          <div class="history-clean-top">
            <div class="history-symbol">${safe(emojiBySession(s))}</div>
            <div class="history-clean-main">
              <div class="history-name">${safe(s.routineName)}</div>
              <div class="routine-meta">${s.exercises.length} ejercicios registrados</div>
            </div>
            <div class="history-date-clean">${fmt(s.date)}</div>
          </div>
          <div class="forja-history-details">
            <span><strong>${doneSets}</strong> series</span>
            <span><strong>${Math.round(volume).toLocaleString()}</strong> vol.</span>
            <span><strong>${s.exercises.length}</strong> ejercicios</span>
          </div>
        </div>`;
    }).join('');
  };

  window.viewRoutine = function(routineId){ startSession(routineId); };

  setTimeout(function(){
    var home = document.getElementById('homeScreen');
    var history = document.getElementById('historyScreen');
    if (home && home.classList.contains('active')) window.renderHome();
    if (history && history.classList.contains('active')) window.renderHistory();
  },0);
})();
</script>

</body>
