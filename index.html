async function ensureCloudHistoryReady(force = false) {
  if (!currentUser) return [];
  if (!force && cloudSessionsLoaded && Array.isArray(cloudSessions)) return cloudSessions;
  try {
    return await refreshCloudHistory(true);
  } catch (error) {
    console.error('ensureCloudHistoryReady', error);
    return cloudSessions || [];
  }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!list) return;

  if (!currentUser) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔐</div><div class="empty-text">Inicia sesión en Cuenta para ver el historial sincronizado.</div></div>`;
    return;
  }

  if (!cloudSessionsLoaded) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">☁️</div><div class="empty-text">Sincronizando historial con Supabase…</div></div>`;
    ensureCloudHistoryReady(true).then(() => renderHistory());
    return;
  }

  const sessions = dedupeSessions(cloudSessions || []);

  if (!sessions.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sin sesiones registradas en Supabase.<br>Termina una rutina para guardarla.</div></div>`;
    return;
  }

  list.innerHTML = sessions.map((s, i) => {
    const active = isActiveCloudSession(s);
    const exercises = Array.isArray(s.exercises) ? s.exercises : [];
    const doneSets = exercises.reduce((acc, ex) => acc + ((ex.sets || []).filter(st => st.done).length), 0);
    const volume = exercises.reduce((acc, ex) => acc + ((ex.sets || []).reduce((a, st) => a + (parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0), 0)), 0);
    const emoji = typeof routineEmojiBySession === 'function' ? routineEmojiBySession(s) : '🏋️';
    return `
      <div class="history-card clean-history-card ${active ? 'active-session-card' : ''}"
        onclick="if(!window.__forjaLongPressDone){${active ? `editSavedSession(${i})` : `showDetail(${i})`}} window.__forjaLongPressDone=false;"
        oncontextmenu="event.preventDefault(); openSessionActions(${i});"
        onpointerdown="forjaStartLongPress(event, ${i})"
        onpointerup="forjaEndLongPress()"
        onpointerleave="forjaEndLongPress()"
        onpointercancel="forjaEndLongPress()">
        <div class="history-clean-top">
          <div class="history-symbol">${escapeHtml(emoji)}</div>
          <div class="history-clean-main">
            <div class="history-name">${escapeHtml(s.routineName || 'Sesión')}${active ? ' <span style="font-size:11px;letter-spacing:.8px;color:#f3c969;margin-left:6px;">EN CURSO</span>' : ''}</div>
            <div class="routine-meta">${exercises.length} ejercicios registrados${active ? ' · actualizándose en Supabase' : ''}</div>
          </div>
          <div class="history-date-clean">${formatDate(s.date)}</div>
        </div>
        <div class="forja-history-details">
          <span><strong>${doneSets}</strong> series</span>
          <span><strong>${Math.round(volume).toLocaleString()}</strong> vol.</span>
          <span><strong>${exercises.length}</strong> ejercicios</span>
        </div>
      </div>
    `;
  }).join('');
}

function showScreen(name) {
  const requestedName = name;
  const goingToSession = name === 'session';

  if (!currentUser && name !== 'auth') {
    name = 'auth';
    if (requestedName !== 'auth' && authBootDone) showToast('🔒 Inicia sesión primero');
  }

  if (!goingToSession) document.body.classList.remove('session-preview-active');

  if (currentSession && !goingToSession) {
    if (!editingSessionKey) saveCurrentDraft();
    stopTimer();
  }

  activateOnlyScreen(name);
  updateBottomNav(name);

  if (name === 'auth') {
    if (currentUser) renderAuthLoggedIn();
    else renderAuthLoggedOut('Inicia sesión para usar FORJA.');
    return;
  }

  if (name === 'session' && currentSession) enterTrainingMode();
  else exitTrainingMode();

  setAuthLocked(false);

  if (name === 'history') {
    renderHistory();
    ensureCloudHistoryReady(true).then(() => renderHistory());
    return;
  }

  if (name === 'home') {
    renderHome();
    ensureCloudHistoryReady(false).then(renderHome);
    return;
  }

  if (name === 'profile') renderProfile();
}

async function initApp() {
  activateOnlyScreen('auth');
  updateBottomNav('auth');
  setAuthLocked(true);
  renderAuthLoggedOut('Cargando cuenta…');

  const user = await getAuthUserFast();
  authBootDone = true;

  if (!user) {
    currentUser = null;
    cloudSessions = [];
    cloudSessionsLoaded = false;
    renderAuthLoggedOut('Inicia sesión para usar FORJA.');
    return;
  }

  await afterLogin(user);
}

let authEventReady = false;
if (supabaseClient?.auth?.onAuthStateChange) {
  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    const user = session?.user || null;
    if (authBusy && !user) return;

    if (!user) {
      currentUser = null;
      cloudSessions = [];
      cloudSessionsLoaded = false;
      if (authEventReady || authBootDone) renderAuthLoggedOut('Inicia sesión para usar FORJA.');
      authEventReady = true;
      return;
    }

    authEventReady = true;
    if (!currentUser || currentUser.id !== user.id) await afterLogin(user);
  });
}

initApp();
