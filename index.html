<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12051f">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FORJA — Bitácora de entrenamiento</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12051f;
    --bg2: #1a0b2b;
    --surface: rgba(33, 17, 49, 0.88);
    --surface-strong: rgba(40, 22, 60, 0.96);
    --surface-soft: rgba(255,255,255,0.04);
    --surface2: #241238;
    --border: rgba(205, 180, 120, 0.12);
    --border-strong: rgba(205, 180, 120, 0.22);
    --accent: #c9a44c;
    --accent2: #8f5a2f;
    --accent-soft: rgba(201, 164, 76, 0.12);
    --text: #f7f2ea;
    --muted: #a89cb8;
    --danger: #ff5d68;
    --success: #47ff8a;
    --shadow: 0 18px 48px rgba(0,0,0,0.34);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    background:
      radial-gradient(circle at top, rgba(201,164,76,0.08), transparent 22%),
      linear-gradient(180deg, #0d0418 0%, #12051f 25%, #170826 100%);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
    background:
      radial-gradient(circle at top left, rgba(201,164,76,0.08), transparent 28%),
      radial-gradient(circle at top right, rgba(143,90,47,0.10), transparent 24%),
      linear-gradient(180deg, #0d0418 0%, #12051f 20%, #18092b 100%);
  }

  .header {
    background: rgba(18,5,31,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 0.95;
    text-shadow: 0 6px 22px rgba(201,164,76,0.18);
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.3px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .nav {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 12px 16px 0;
    padding: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 18px;
    position: sticky;
    top: 82px;
    z-index: 99;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .nav-btn {
    flex: initial;
    padding: 11px 6px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.18s ease;
  }

  .nav-btn.active {
    color: #12051f;
    background: linear-gradient(180deg, #d8b35a 0%, #b88d31 100%);
    box-shadow: 0 10px 24px rgba(201,164,76,0.22);
  }

  .screen {
    display: none;
    padding: 18px 18px 110px;
    overflow-y: auto;
  }

  .screen.active {
    display: block;
    overflow-y: auto;
    height: calc(100vh - 132px);
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 2px;
    color: #d1c5df;
    margin-bottom: 14px;
    margin-top: 6px;
    margin-left: 4px;
  }

  .routine-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .routine-card,
  .exercise-card,
  .history-card {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%),
      rgba(31, 14, 46, 0.86);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .routine-card {
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.18s ease, border-color 0.18s ease;
  }

  .routine-card:active {
    transform: scale(0.985);
    border-color: var(--border-strong);
  }

  .routine-emoji {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    font-size: 28px;
    background: linear-gradient(180deg, rgba(201,164,76,0.18), rgba(201,164,76,0.08));
    border: 1px solid rgba(201,164,76,0.18);
    flex-shrink: 0;
  }

  .routine-info { flex: 1; }

  .routine-name {
    font-weight: 700;
    font-size: 17px;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }

  .routine-meta {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.35;
  }

  .session-header {
    margin-bottom: 20px;
    padding: 4px 4px 0;
  }

  .session-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
    line-height: 0.95;
  }

  .session-date {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 2px 0;
    margin-bottom: 16px;
  }

  .exercise-card,
  .history-card {
    margin-bottom: 14px;
    overflow: hidden;
  }

  .exercise-header {
    padding: 15px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .exercise-name {
    font-weight: 700;
    font-size: 14px;
    line-height: 1.25;
  }

  .prev-badge {
    font-size: 10px;
    color: #1b1000;
    background: linear-gradient(180deg, #dfbb63 0%, #c39a43 100%);
    padding: 4px 8px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .prev-info {
    padding: 9px 16px;
    background: var(--accent-soft);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .prev-info span {
    color: #e8c779;
    font-weight: 600;
  }

  .sets-table { padding: 14px 16px 16px; }

  .sets-header {
    display: grid;
    grid-template-columns: 30px 1fr 1fr 38px;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
  }

  .set-row {
    display: grid;
    grid-template-columns: 30px 1fr 1fr 38px;
    gap: 8px;
    margin-bottom: 9px;
    align-items: center;
  }

  .set-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-align: center;
  }

  .set-input,
  .notes-input,
  input[type="email"],
  input[type="password"] {
    background: rgba(10, 4, 18, 0.52);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 11px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    -webkit-appearance: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .set-input { text-align: center; }

  .set-input:focus,
  .notes-input:focus,
  input[type="email"]:focus,
  input[type="password"]:focus {
    outline: none;
    border-color: rgba(201,164,76,0.55);
    box-shadow: 0 0 0 3px rgba(201,164,76,0.10);
  }

  .set-input.completed {
    border-color: rgba(71,255,138,0.55);
    color: var(--success);
  }

  .set-check {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.2s;
    color: var(--muted);
  }

  .set-check.done {
    background: linear-gradient(180deg, #47ff8a 0%, #2fdb72 100%);
    border-color: transparent;
    color: #03130a;
    box-shadow: 0 8px 18px rgba(71,255,138,0.20);
  }

  .add-set-btn {
    width: 100%;
    padding: 11px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(201,164,76,0.24);
    border-radius: 14px;
    color: #d8c089;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 7px;
    transition: all 0.18s ease;
  }

  .finish-btn {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 34px);
    max-width: 446px;
    padding: 16px;
    background: linear-gradient(180deg, #ddb965 0%, #bc9138 100%);
    color: #140813;
    border: none;
    border-radius: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 18px 34px rgba(201,164,76,0.20);
  }

  .finish-btn:active { transform: translateX(-50%) scale(0.985); }

  .history-card {
    padding: 16px;
    cursor: pointer;
  }

  .history-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .history-name {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
    margin-right: 10px;
  }

  .history-date {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }

  .history-stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .history-stat {
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 999px;
    padding: 6px 10px;
  }

  .history-stat strong {
    color: var(--text);
    font-weight: 700;
  }

  .detail-set {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
  }

  .detail-set-num {
    width: 24px;
    height: 24px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
  }

  .detail-set-data { flex: 1; }
  .detail-set-weight { font-weight: 700; }
  .detail-set-reps { color: var(--muted); font-size: 12px; }

  .empty {
    text-align: center;
    padding: 74px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 50px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.7; }

  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(180deg, #47ff8a 0%, #2fdb72 100%);
    color: #06170d;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
    box-shadow: 0 14px 28px rgba(71,255,138,0.16);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .rest-timer {
    position: static;
    display: none;
    margin-top: -2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: 1.2px;
    color: #a56dff;
    background: none;
    padding: 0;
    border: none;
    border-radius: 0;
    cursor: default;
    text-shadow: 0 0 18px rgba(165,109,255,0.28), 0 0 36px rgba(121,74,255,0.18);
    z-index: 150;
    user-select: none;
    -webkit-user-select: none;
  }

  .rest-timer.visible { display: block; }

  .notes-input {
    resize: none;
    margin-top: 8px;
    min-height: 64px;
  }

  button {
    transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
  }

  button:active {
    transform: scale(0.985);
  }



  #sessionScreen {
    padding-top: 12px;
    background:
      radial-gradient(circle at top, rgba(201,164,76,0.06), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,0.01) 0%, transparent 20%);
  }

  .session-header {
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 16px 16px 14px;
    margin-bottom: 16px;
    box-shadow: 0 14px 28px rgba(0,0,0,0.22);
  }

  .session-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(201,164,76,0.12);
    border: 1px solid rgba(201,164,76,0.16);
    color: #e6c26b;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    margin-bottom: 12px;
  }

  .session-overview {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
      rgba(23, 10, 37, 0.92);
    border: 1px solid var(--border-strong);
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 18px 42px rgba(0,0,0,0.28);
  }

  .session-overview-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .session-overview-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1.4px;
    color: var(--text);
    line-height: 0.95;
  }

  .session-overview-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
  }

  .session-progress-ring {
    min-width: 58px;
    height: 58px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, rgba(201,164,76,0.22), rgba(201,164,76,0.08));
    border: 1px solid rgba(201,164,76,0.18);
    color: var(--accent);
    font-weight: 700;
    font-size: 16px;
  }

  .session-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .session-stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 12px;
  }

  .session-stat-label {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .session-stat-value {
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
  }

  .training-card {
    position: relative;
    overflow: hidden;
  }

  .training-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: linear-gradient(180deg, #dfbb63 0%, rgba(223,187,99,0.08) 100%);
    opacity: 0.9;
  }

  .exercise-header {
    padding: 16px 16px 12px 18px;
  }

  .exercise-topline {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .exercise-index {
    width: 28px;
    height: 28px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: rgba(201,164,76,0.12);
    border: 1px solid rgba(201,164,76,0.16);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .exercise-title-block {
    min-width: 0;
  }

  .exercise-name {
    font-size: 15px;
    letter-spacing: -0.2px;
  }

  .exercise-submeta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
  }

  .exercise-tools {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 16px 0 18px;
  }

  .ghost-link {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
  }

  .ghost-link:hover { color: var(--text); }

  .sets-table {
    padding: 14px 16px 14px 18px;
  }

  .sets-header {
    margin-bottom: 10px;
    color: #8f83a1;
  }

  .set-row {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 8px;
    margin-bottom: 9px;
  }

  .set-num {
    width: 26px;
    height: 26px;
    border-radius: 9px;
    background: rgba(255,255,255,0.045);
    display: grid;
    place-items: center;
    font-size: 12px;
    margin: 0 auto;
  }

  .set-input {
    height: 42px;
    border-radius: 12px;
    background: rgba(15, 8, 24, 0.78);
    border-color: rgba(255,255,255,0.05);
  }

  .set-check {
    width: 36px;
    height: 36px;
    border-radius: 12px;
  }

  .add-set-btn {
    border-style: solid;
    border-color: rgba(201,164,76,0.14);
    background: rgba(201,164,76,0.08);
    color: #e5c16a;
    height: 42px;
    font-weight: 600;
  }

  .notes-shell {
    padding: 0 16px 16px 18px;
  }

  .notes-input {
    min-height: 72px;
    border-radius: 14px;
    background: rgba(15, 8, 24, 0.74);
    border-color: rgba(255,255,255,0.05);
  }

  .session-preview-card {
    padding: 16px 18px;
  }

  .session-preview-meta {
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 390px) {
    .nav-btn { font-size: 16px; }
    .header-title { font-size: 34px; }
    .finish-btn { font-size: 20px; }
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }


  .dashboard-hero,
  .profile-shell,
  .detail-shell {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%),
      rgba(31, 14, 46, 0.86);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .dashboard-hero {
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .dashboard-hero::after,
  .profile-shell::after,
  .detail-shell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, rgba(201,164,76,0.14), transparent 34%);
    pointer-events: none;
  }

  .dashboard-hero-top,
  .profile-head,
  .detail-head {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(201, 164, 76, 0.12);
    border: 1px solid rgba(201, 164, 76, 0.16);
    padding: 5px 9px;
    border-radius: 999px;
    margin-bottom: 10px;
  }

  .hero-title,
  .profile-name,
  .detail-title {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1.3px;
    line-height: 0.95;
  }

  .hero-title { font-size: 34px; }
  .profile-name { font-size: 34px; color: var(--accent); }

function cloneData(value) {
  return JSON.parse(JSON.stringify(value));
}

function normalizeText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .trim();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function getRoutinesLocal() {
  try {
    const savedRaw = localStorage.getItem('forja_routines') || localStorage.getItem('gymlog_routines');
    const saved = JSON.parse(savedRaw || 'null');
    if (Array.isArray(saved) && saved.length) return saved;
  } catch (e) {
    console.warn('getRoutinesLocal', e);
  }
  return cloneData(DEFAULT_ROUTINES);
}

function saveRoutinesLocal() {
  localStorage.setItem('forja_routines', JSON.stringify(ROUTINES));
}

function resetRoutinesToDefault() {
  if (!confirm('¿Restaurar la rutina base? Se perderán los cambios hechos a las rutinas.')) return;
  ROUTINES = cloneData(DEFAULT_ROUTINES);
  saveRoutinesLocal();
  renderHome();
  showToast('✅ Rutina base restaurada');
}

function getTodayRoutine() {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const today = days[new Date().getDay()];
  return ROUTINES.find(r => normalizeText(r.day) === normalizeText(today)) || null;
}

function getRoutineById(routineId) {
  return ROUTINES.find(r => r.id === routineId) || null;
}

function getValidSets(sets) {
  return (sets || []).filter(s => {
    const weight = parseFloat(s.weight);
    const reps = parseFloat(s.reps);
    return (s.done || s.weight || s.reps) && !Number.isNaN(weight) && !Number.isNaN(reps) && reps > 0;
  });
}

function getTotalReps(sets) {
  return getValidSets(sets).reduce((sum, s) => sum + (parseFloat(s.reps) || 0), 0);
}

function getVolume(sets) {
  return getValidSets(sets).reduce((sum, s) => sum + ((parseFloat(s.weight) || 0) * (parseFloat(s.reps) || 0)), 0);
}

function getBestSet(sets) {
  const valid = getValidSets(sets);
  if (!valid.length) return null;
  return valid.reduce((best, s) => {
    const score = (parseFloat(s.weight) || 0) * (parseFloat(s.reps) || 0);
    const bestScore = (parseFloat(best.weight) || 0) * (parseFloat(best.reps) || 0);
    return score > bestScore ? s : best;
  }, valid[0]);
}

function getExerciseInsight(lastEx, currentEx) {
  if (!lastEx) {
    return `
      <div class="analysis-box">
        <div class="analysis-title">Objetivo de hoy</div>
        <div class="analysis-text">Primer registro de este ejercicio. Usa un peso controlable, deja 1–2 repeticiones en reserva y guarda datos limpios.</div>
      </div>
    `;
  }

  const lastSets = getValidSets(lastEx.sets);
  if (!lastSets.length) {
    return `
      <div class="analysis-box">
        <div class="analysis-title">Objetivo de hoy</div>
        <div class="analysis-text">La sesión anterior no tiene series completas confiables. Registra peso y repeticiones reales antes de buscar subir carga.</div>
      </div>
    `;
  }

  const lastReps = getTotalReps(lastEx.sets);
  const lastVolume = Math.round(getVolume(lastEx.sets));
  const best = getBestSet(lastEx.sets);
  const targetReps = lastReps + 1;
  const bestText = best ? `${best.weight} lb × ${best.reps}` : 'sin mejor serie';

  return `
    <div class="analysis-box">
      <div class="analysis-title">Objetivo de hoy</div>
      <div class="analysis-text">
        Anterior: ${lastSets.length} series, ${lastReps} repeticiones totales, ${lastVolume.toLocaleString()} lb de volumen. Mejor serie: ${bestText}.<br>
        Hoy intenta mínimo ${targetReps} repeticiones totales con técnica limpia. Sube peso solo si completas todas las series sin perder control.
      </div>
    </div>
  `;
}

const CURRENT_SESSION_KEY = 'gymlog_current_session';

function getDraftOwnerId() {
  return currentUser?.id || 'local';
}

function saveCurrentDraft() {
  if (!currentSession) return;
  try {
    localStorage.setItem(CURRENT_SESSION_KEY, JSON.stringify({
      owner: getDraftOwnerId(),
      savedAt: new Date().toISOString(),
      session: stripCloudMeta(currentSession)
    }));
  } catch (e) {
    console.warn('saveCurrentDraft', e);
  }
}

function getCurrentDraft() {
  try {
    const draft = JSON.parse(localStorage.getItem(CURRENT_SESSION_KEY) || 'null');
    if (!draft?.session) return null;
    if (draft.owner && draft.owner !== getDraftOwnerId()) return null;
    return draft.session;
  } catch (e) {
    console.warn('getCurrentDraft', e);
    return null;
  }
}

function getDraftSavedAt() {
  try {
    const draft = JSON.parse(localStorage.getItem(CURRENT_SESSION_KEY) || 'null');
    if (!draft?.savedAt) return '';
    if (draft.owner && draft.owner !== getDraftOwnerId()) return '';
    return draft.savedAt;
  } catch {
    return '';
  }
}

function clearCurrentDraft() {
  localStorage.removeItem(CURRENT_SESSION_KEY);
}

function resumeSavedSession() {

    showToast('⚠️ No hay sesión guardada');

function stripCloudMeta(session) {
  if (!session) return session;
  const copy = JSON.parse(JSON.stringify(session));
  delete copy._cloudId;
  return copy;
}

function sessionKey(session) {
  return `${session.routineName}__${session.date}`;
}

function dedupeSessions(sessions) {
  const map = new Map();
  for (const session of sessions || []) {
    if (!session || !session.routineName || !session.date) continue;
    const key = sessionKey(session);
    if (!map.has(key)) map.set(key, session);
  }
  return Array.from(map.values()).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getSessionsLocal() {
  try {
    const raw = JSON.parse(localStorage.getItem('gymlog_sessions') || '[]');
    return Array.isArray(raw) ? raw : [];
  } catch {
    return [];
  }
}

function setSessionsLocal(sessions) {
  localStorage.setItem('gymlog_sessions', JSON.stringify(sessions.map(stripCloudMeta)));
}

function getSessions() {
  return currentUser ? dedupeSessions(cloudSessions) : dedupeSessions(getSessionsLocal());
}

function getLastSession(routineId) {
  const sessions = getSessions();
  return sessions.find(s => s.routineId === routineId) || null;
}

function getLastExerciseData(routineId, exerciseName) {
  const last = getLastSession(routineId);
  if (!last) return null;
  return last.exercises.find(e => e.name === exerciseName) || null;
}

async function loadCloudSessions() {
  if (!currentUser) {
    cloudSessions = [];
    return [];
  }

  const { data, error } = await supabaseClient
    .from('sessions')
    .select('id, routine_id, routine_name, date, data_json')
    .eq('user_id', currentUser.id)
    .order('date', { ascending: false });

  if (error) {
    console.error('loadCloudSessions', error);
    showToast('❌ ' + error.message);
    return [];
  }

  cloudSessions = dedupeSessions((data || []).map(row => ({
    ...row.data_json,
    _cloudId: row.id,
    routineId: row.data_json?.routineId || row.routine_id,
    routineName: row.data_json?.routineName || row.routine_name,
    date: row.data_json?.date || row.date,
  })));

  return cloudSessions;
}

async function syncLocalSessionsToCloud() {
  if (!currentUser) return true;

  const localSessions = dedupeSessions(getSessionsLocal());
  if (!localSessions.length) return true;

  const { data: existingRows, error: fetchError } = await supabaseClient
    .from('sessions')
    .select('id, routine_name, date')
    .eq('user_id', currentUser.id);

  if (fetchError) {
    console.error('syncLocalSessionsToCloud', fetchError);
    showToast('❌ ' + fetchError.message);
    return false;
  }

  const existingKeys = new Set((existingRows || []).map(row => `${row.routine_name}__${row.date}`));
  const rows = localSessions
    .filter(session => !existingKeys.has(sessionKey(session)))
    .map(session => ({
      user_id: currentUser.id,
      routine_id: session.routineId,
      routine_name: session.routineName,
      date: session.date,
      data_json: stripCloudMeta(session),
    }));

  if (rows.length) {
    const { error } = await supabaseClient.from('sessions').insert(rows);
    if (error) {
      console.error('syncLocalSessionsToCloud insert', error);
      showToast('❌ ' + error.message);
      return false;
    }
  }

  await loadCloudSessions();
  setSessionsLocal(dedupeSessions(cloudSessions));
  return true;
}

async function saveSession(session) {
  const cleanSession = stripCloudMeta(session);
  const localSessions = dedupeSessions([cleanSession, ...getSessionsLocal()]);
  setSessionsLocal(localSessions);

  if (!currentUser) return true;

  const { data: existing, error: checkError } = await supabaseClient
    .from('sessions')
    .select('id')
    .eq('user_id', currentUser.id)
    .eq('routine_name', cleanSession.routineName)
    .eq('date', cleanSession.date)
    .limit(1);

  if (checkError) {
    console.error('saveSession check', checkError);
    showToast('❌ ' + checkError.message);
    return false;
  }

  if (!existing || existing.length === 0) {
    const { data, error } = await supabaseClient
      .from('sessions')
      .insert({
        user_id: currentUser.id,
        routine_id: cleanSession.routineId,
        routine_name: cleanSession.routineName,
        date: cleanSession.date,
        data_json: cleanSession,
      })
      .select('id')
      .single();

    if (error) {
      console.error('saveSession insert', error);
      showToast('❌ ' + error.message);
      return false;
    }

    cloudSessions.unshift({ ...cleanSession, _cloudId: data.id });
  }

  cloudSessions = dedupeSessions(cloudSessions);
  setSessionsLocal(currentUser ? dedupeSessions(cloudSessions) : localSessions);
  return true;
}

function showScreen(name) {
  const goingToSession = name === 'session';

  if (currentSession && !goingToSession) {
    saveCurrentDraft();
    stopTimer();
  }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + 'Screen').classList.add('active');

  const navMap = { home: 0, history: 1, profile: 2, auth: 3 };
  if (navMap[name] !== undefined) {
    document.querySelectorAll('.nav-btn')[navMap[name]].classList.add('active');
  }

  if (name === 'history') renderHistory();
  if (name === 'home') renderHome();
  if (name === 'profile') renderProfile();
  if (name === 'auth') renderAuthStatus();
}

function startSession(routineId) {
  const routine = getRoutineById(routineId);
  if (!routine) { showToast('⚠️ Rutina no encontrada'); return; }

  const existingDraft = currentSession || getCurrentDraft();
  if (existingDraft) {
    const replace = confirm('Ya hay una sesión guardada. ¿Reemplazarla por una nueva sesión de ' + routine.name + '?');
    if (!replace) return;
    clearCurrentDraft();
    stopTimer();
  } else if (!confirm('¿Iniciar sesión de ' + routine.name + '?')) {
    return;
  }

  currentSession = {
    routineId,
    routineName: routine.name,
    date: new Date().toISOString(),
    exercises: routine.exercises.map(ex => {
      const lastEx = getLastExerciseData(routineId, ex.name);
      return {
        name: ex.name,
        originalName: ex.name,
        note: ex.note || null,
        replaced: false,
        sets: Array.from({ length: ex.sets }, (_, i) => {
          const lastSet = lastEx?.sets?.[i];
          return { weight: lastSet?.weight || '', reps: lastSet?.reps || '', done: false };
        })
      };
    })
  };

  saveCurrentDraft();
  document.getElementById('sessionTitle').textContent = routine.name.toUpperCase();
  document.getElementById('sessionDate').innerHTML = `<span class="session-kicker">Sesión en curso</span><div>${formatDateFull(new Date())}</div>`;
  renderExercises();

  document.querySelector('.finish-btn').textContent = 'TERMINAR SESIÓN';
  document.querySelector('.finish-btn').onclick = () => finishSession();

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('sessionScreen').classList.add('active');
}

function updateSet(ei, si, field, value) {
  currentSession.exercises[ei].sets[si][field] = value;
  saveCurrentDraft();
  updateSessionCounters();
}
function updateNotes(ei, value) {
  currentSession.exercises[ei].notes = value;
  saveCurrentDraft();
}
function updateSessionCounters() {
  if (!currentSession) return;

  const completed = currentSession.exercises.reduce((acc, ex) => {
    return acc + ex.sets.filter(st => st.done).length;
  }, 0);

  const completedEl = document.getElementById('completedSetsCounter');
  if (completedEl) completedEl.textContent = completed;
  saveCurrentDraft();
}
function toggleSet(ei, si) {
  const set = currentSession.exercises[ei].sets[si];
  const wEl = document.getElementById(`weight-${ei}-${si}`);

  if (!set.done) {
    set.weight = wEl.value || wEl.placeholder;
    set.reps = rEl.value || rEl.placeholder;
    wEl.value = set.weight;
    rEl.value = set.reps;
  }

  set.done = !set.done;

  rEl.className = `set-input ${set.done ? 'completed' : ''}`;

function addSet(ei) {
  const ex = currentSession.exercises[ei];
  const lastSet = ex.sets[ex.sets.length - 1];
  ex.sets.push({ weight: lastSet?.weight || '', reps: lastSet?.reps || '', done: false });
  saveCurrentDraft();
  renderExercises();
}

async function finishSession() {
  if (!currentSession) {
    showToast('⚠️ No hay una sesión activa');
    return;
  }

  const doneSets = currentSession.exercises.reduce((acc, ex) => acc + ex.sets.filter(s => s.done).length, 0);
  if (doneSets === 0) {
    showToast('⚠️ Marca al menos una serie como completada');
    return;
  }

  const ok = await saveSession(currentSession);
  if (ok === false) return;

  currentSession = null;
  clearCurrentDraft();
  stopTimer();
  showToast('✅ Sesión guardada');
  const finishBtn = document.querySelector('.finish-btn');
  finishBtn.textContent = 'TERMINAR SESIÓN';
  finishBtn.onclick = () => finishSession();
  renderHome();
  renderHistory();
  setTimeout(() => { showScreen('home'); }, 1200);
}

function renderHistory() {
  const sessions = getSessions();
  const list = document.getElementById('historyList');

  if (sessions.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sin sesiones registradas.<br>Selecciona una rutina para empezar.</div></div>`;
    return;
  }

  const totalSets = sessions.reduce((acc, s) => acc + s.exercises.reduce((sum, ex) => sum + ex.sets.filter(st => st.done).length, 0), 0);
  const totalVolume = sessions.reduce((acc, s) => acc + s.exercises.reduce((sum, ex) => sum + ex.sets.filter(st => st.done).reduce((a, st) => a + (parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0), 0), 0), 0);

  list.innerHTML = `
    <div class="history-summary-grid">
      <div class="history-summary-card"><div class="history-summary-label">Sesiones</div><div class="history-summary-value">${sessions.length}</div></div>
      <div class="history-summary-card"><div class="history-summary-label">Series hechas</div><div class="history-summary-value">${totalSets}</div></div>
      <div class="history-summary-card"><div class="history-summary-label">Volumen</div><div class="history-summary-value">${Math.round(totalVolume).toLocaleString()}</div></div>
      <div class="history-summary-card"><div class="history-summary-label">Última</div><div class="history-summary-value">${formatDate(sessions[0].date)}</div></div>
    </div>
    ${sessions.map((s, i) => {
      const doneSets = s.exercises.reduce((acc, ex) => acc + ex.sets.filter(st => st.done).length, 0);
      const volume = s.exercises.reduce((acc, ex) => acc + ex.sets.filter(st => st.done).reduce((a, st) => a + (parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0), 0), 0);
      return `
        <div class="history-card">
          <div class="history-top" onclick="showDetail(${i})" style="cursor:pointer;">
            <div>
              <div class="history-name">${s.routineName}</div>
              <div class="routine-meta" style="margin-top:4px;">${s.exercises.length} ejercicios registrados</div>
            </div>
            <div class="history-date-badge">${formatDate(s.date)}</div>
          </div>
          <div class="history-stats" onclick="showDetail(${i})" style="cursor:pointer;">
            <div class="history-stat"><strong>${doneSets}</strong>series</div>
            <div class="history-stat"><strong>${Math.round(volume).toLocaleString()}</strong>vol.</div>

            <button onclick="openShareMenu(${i})" class="mini-btn primary">Compartir</button>
            <button onclick="deleteSession(${i})" class="mini-btn danger">Eliminar</button>
          </div>
        </div>
      `;
    }).join('')}
  `;
}

async function deleteSession(index) {
  const sessions = getSessions();
  const session = sessions[index];
  if (!confirm('¿Eliminar esta sesión del historial?')) return;

  const localSessions = getSessionsLocal().filter(s => !(s.routineName === session.routineName && s.date === session.date));
  setSessionsLocal(localSessions);

  if (currentUser) {
    const { error } = await supabaseClient
      .from('sessions')
      .delete()
      .eq('user_id', currentUser.id)
      .eq('routine_name', session.routineName)
      .eq('date', session.date);

    if (error) {
      console.error('deleteSession', error);
      showToast('❌ ' + error.message);
      return;
    }

    cloudSessions = cloudSessions.filter(s => !(s.routineName === session.routineName && s.date === session.date));
  }

  renderHome();
  renderHistory();
  showToast('🗑️ Sesión eliminada');
}

      <div class="exercise-card detail-exercise-card">
        <div class="detail-exercise-title">${ex.name}</div>
        <div class="sets-table" style="padding:0;">
          ${ex.sets.filter(st => st.done).map((st, i) => `
            <div class="detail-set">
              <div class="detail-set-num">${i + 1}</div>
              <div class="detail-set-data">
                <span class="detail-set-weight">${st.weight} lbs</span>
                <span class="detail-set-reps"> × ${st.reps} reps</span>
              </div>
            </div>
          `).join('')}
          ${ex.notes ? `<div class="detail-notes"><div class="detail-notes-title">Notas</div><div style="font-size:13px;line-height:1.5;color:var(--text);">${ex.notes}</div></div>` : ''}
        </div>
      </div>
    `).join('')}
  `;

  document.getElementById('detailContent').innerHTML = content;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('detailScreen').classList.add('active');
}

function unlockTimerAudio() {
  if (!audioCtx) {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (AudioContextClass) audioCtx = new AudioContextClass();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}

function playTimerBeep() {
  if (!audioCtx) return;
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
  gainNode.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 0.01);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.26);
}

function handleTimerTick() {
  if (!timerEndTime) return;
  const remainingMs = timerEndTime - Date.now();
  if (remainingMs <= 0) {
    stopTimer();
    playTimerBeep();
    showToast('⏱ Descanso terminado — siguiente serie');
  } else {
    updateTimerDisplay();
  }
}

function startTimer(seconds) {
  stopTimer();
  unlockTimerAudio();
  timerPausedRemainingMs = null;
  timerEndTime = Date.now() + (seconds * 1000);
  const el = document.getElementById('timerDisplay');
  const controls = document.getElementById('timerControls');
  const pauseBtn = document.getElementById('timerPauseBtn');
  if (pauseBtn) pauseBtn.textContent = 'Pausar';
  el.classList.add('visible');
  if (controls) controls.classList.add('visible');
  updateTimerDisplay();
  timerInterval = setInterval(handleTimerTick, 250);
}

function adjustTimer(seconds) {
  if (!timerEndTime && timerPausedRemainingMs === null) return;
  if (timerPausedRemainingMs !== null) {
    timerPausedRemainingMs = Math.max(0, timerPausedRemainingMs + (seconds * 1000));
  } else {
    timerEndTime = Math.max(Date.now(), timerEndTime + (seconds * 1000));
  }
  updateTimerDisplay();
}

function toggleTimerPause() {
  if (!timerEndTime && timerPausedRemainingMs === null) return;
  const pauseBtn = document.getElementById('timerPauseBtn');

  if (timerPausedRemainingMs !== null) {
    timerEndTime = Date.now() + timerPausedRemainingMs;
    timerPausedRemainingMs = null;
    clearInterval(timerInterval);
    timerInterval = setInterval(handleTimerTick, 250);
    if (pauseBtn) pauseBtn.textContent = 'Pausar';
  } else {
    timerPausedRemainingMs = Math.max(timerEndTime - Date.now(), 0);
    clearInterval(timerInterval);
    timerInterval = null;
    timerEndTime = null;
    if (pauseBtn) pauseBtn.textContent = 'Seguir';
  }

  updateTimerDisplay();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerEndTime = null;
  timerPausedRemainingMs = null;
  const el = document.getElementById('timerDisplay');
  const controls = document.getElementById('timerControls');
  if (el) el.classList.remove('visible');
  if (controls) controls.classList.remove('visible');
}

function updateTimerDisplay() {
  const remainingMs = timerPausedRemainingMs !== null
    ? timerPausedRemainingMs
    : (timerEndTime ? Math.max(timerEndTime - Date.now(), 0) : 0);
  const totalSeconds = Math.ceil(remainingMs / 1000);
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

function getSummary(sets) {
  const done = sets.filter(s => s.done || s.weight);
  if (!done.length) return 'Sin datos';
  const w = done[0].weight;
  const avgR = Math.round(done.reduce((a, s) => a + (parseFloat(s.reps) || 0), 0) / done.length);
  return `${done.length} series · ${w} lbs · ~${avgR} reps`;
}

function formatDate(iso) {
  const d = new Date(iso);
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function formatDateFull(d) {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]} ${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}


function formatDateForFile(iso) {
  const d = new Date(iso);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function safeFileName(text) {
  return String(text || 'forja')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'forja';
}

function getCompletedSets(exercise) {
  return (exercise.sets || []).filter(st => st.done);
}

function getSessionTotals(session) {
  const doneSets = session.exercises.reduce((acc, ex) => acc + getCompletedSets(ex).length, 0);
  const totalReps = session.exercises.reduce((acc, ex) => {
    return acc + getCompletedSets(ex).reduce((sum, st) => sum + (parseFloat(st.reps) || 0), 0);
  }, 0);
  const totalVolume = session.exercises.reduce((acc, ex) => {
    return acc + getCompletedSets(ex).reduce((sum, st) => {
      return sum + ((parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0));
    }, 0);
  }, 0);
  return { doneSets, totalReps, totalVolume, exercises: session.exercises.length };
}

function formatExerciseTxt(exercise) {
  const lines = [];
  const done = getCompletedSets(exercise);
  lines.push(exercise.name);

  if (!done.length) {
    lines.push('Sin series completadas.');
  } else {
    done.forEach((st, i) => {
      const weight = st.weight || '--';
      const reps = st.reps || '--';
      lines.push(`Serie ${i + 1}: ${weight} lb x ${reps} reps`);
    });
  }

  if (exercise.replaced && exercise.originalName) lines.push(`Sustituye a: ${exercise.originalName}`);
  if (exercise.notes) lines.push(`Notas: ${exercise.notes}`);
  return lines.join('\n');
}

function formatSessionTxt(session) {
  const totals = getSessionTotals(session);
  const lines = [];

  lines.push(session.routineName.toUpperCase());
  lines.push(formatDateFull(new Date(session.date)));
  lines.push('');
  lines.push(`Series completadas: ${totals.doneSets}`);
  lines.push(`Repeticiones totales: ${totals.totalReps}`);
  lines.push(`Volumen total: ${Math.round(totals.totalVolume).toLocaleString()} lb`);
  lines.push('');

  session.exercises.forEach((ex, i) => {
    lines.push(`EJERCICIO ${i + 1}`);
    lines.push(formatExerciseTxt(ex));
    lines.push('');
  });

  return lines.join('\n').trim();
}

function formatSessionCsv(session) {
  const rows = [['fecha','rutina','ejercicio','serie','peso_lb','repeticiones','volumen_lb','sustituye_a','notas']];

  session.exercises.forEach(ex => {
    getCompletedSets(ex).forEach((set, index) => {
      const weight = parseFloat(set.weight) || 0;
      const reps = parseFloat(set.reps) || 0;
      rows.push([
        formatDateForFile(session.date),
        session.routineName,
        ex.name,
        index + 1,
        set.weight || '',
        set.reps || '',
        weight * reps,
        ex.replaced ? (ex.originalName || '') : '',
        ex.notes || ''
      ]);
    });
  });

  return rows.map(row => row.map(csvEscape).join(',')).join('\n');
}

function formatCompactSession(session) {
  const totals = getSessionTotals(session);
  const lines = [];

  lines.push(`${session.routineName} — ${formatDateFull(new Date(session.date))}`);
  lines.push(`Resumen: ${totals.doneSets} series, ${totals.totalReps} reps, ${Math.round(totals.totalVolume).toLocaleString()} lb de volumen.`);
  lines.push('');

  session.exercises.forEach(ex => {
    const done = getCompletedSets(ex);
    const setsText = done.length
      ? done.map(st => `${st.weight || '--'} lb x ${st.reps || '--'}`).join(' | ')
      : 'sin series completadas';
    lines.push(`${ex.name}: ${setsText}`);
    if (ex.replaced && ex.originalName) lines.push(`Sustituye a: ${ex.originalName}`);
    if (ex.notes) lines.push(`Notas: ${ex.notes}`);
  });

  return lines.join('\n');
}

function formatAnalysisTxt(session) {
  const lines = [];

  lines.push('ANALIZA MI ENTRENAMIENTO');
  lines.push('');
  lines.push(`Rutina: ${session.routineName}`);
  lines.push(`Fecha: ${formatDateFull(new Date(session.date))}`);
  lines.push('Objetivo: ganar músculo, progresar sin sacrificar técnica.');
  lines.push('');
  lines.push('ENTRENAMIENTO ACTUAL:');
  lines.push(formatCompactSession(session));
  lines.push('');
  lines.push('Usa el historial que ya te he compartido en esta conversación. No incluyo sesión anterior para evitar duplicar datos.');
  lines.push('');
  lines.push('Dime exactamente:');
  lines.push('1. dónde progresé');
  lines.push('2. dónde bajé rendimiento');
  lines.push('3. qué debo intentar la próxima vez');
  lines.push('4. si debo subir, mantener o bajar peso en cada ejercicio');
  lines.push('5. qué correcciones técnicas debo cuidar');

  return lines.join('\n');
}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType || 'text/plain;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function copyTextToClipboard(text, successMessage, fallbackFilename) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (!ok) throw new Error('Copia bloqueada');
    }
    showToast(successMessage || '✅ Copiado');
  } catch (error) {
    console.warn('copyTextToClipboard', error);
    downloadTextFile(fallbackFilename || 'forja-entrenamiento.txt', text, 'text/plain;charset=utf-8;');
    showToast('⚠️ No se pudo copiar; descargué TXT');
  }
}

function getSessionByIndex(index) {
  const session = getSessions()[index];
  if (!session) showToast('⚠️ No encontré esa sesión');
  return session;
}

function copySessionTxt(index) {
  const session = getSessionByIndex(index);
  if (!session) return;
  const filename = `${safeFileName(session.routineName)}-${formatDateForFile(session.date)}.txt`;
  copyTextToClipboard(formatSessionTxt(session), '✅ Entrenamiento copiado', filename);
}

function copyAnalysisTxt(index) {
  const session = getSessionByIndex(index);
  if (!session) return;
  const filename = `${safeFileName(session.routineName)}-${formatDateForFile(session.date)}-para-chad.txt`;
  copyTextToClipboard(formatAnalysisTxt(session), '✅ Texto para Chad copiado', filename);
}

function exportSessionCsv(index) {
  const session = getSessionByIndex(index);
  if (!session) return;
  const filename = `${safeFileName(session.routineName)}-${formatDateForFile(session.date)}.csv`;
  downloadTextFile(filename, '\uFEFF' + formatSessionCsv(session), 'text/csv;charset=utf-8;');
  showToast('✅ CSV descargado');
}

async function shareSessionTxt(index) {
  const session = getSessionByIndex(index);
  if (!session) return;
  const text = formatSessionTxt(session);

  if (navigator.share) {
    try {
      await navigator.share({
        title: `${session.routineName} — ${formatDateForFile(session.date)}`,
        text
      });
      showToast('✅ Compartido');
      return;
    } catch (error) {
      if (error && error.name === 'AbortError') return;
      console.warn('shareSessionTxt', error);
    }
  }

  const filename = `${safeFileName(session.routineName)}-${formatDateForFile(session.date)}.txt`;
  copyTextToClipboard(text, '✅ Compartir no disponible; copié TXT', filename);
}

function closeShareMenu() {
  const overlay = document.getElementById('shareMenuOverlay');
  if (overlay) overlay.remove();
}

function openShareMenu(index) {
  const session = getSessionByIndex(index);
  if (!session) return;

  closeShareMenu();

  const overlay = document.createElement('div');
  overlay.id = 'shareMenuOverlay';
  overlay.className = 'edit-overlay';

  overlay.innerHTML = `
    <div class="edit-overlay-card">
      <div class="edit-title">Compartir entrenamiento</div>

      <div style="font-size:13px;color:var(--muted);line-height:1.45;margin-bottom:14px;">
        ${escapeHtml(session.routineName)} · ${formatDate(session.date)}
      </div>

      <div style="display:grid;gap:10px;">
        <button class="mini-btn primary" style="width:100%;padding:13px;" onclick="handleShareMenuOption(${index}, 'chad')">
          Para Chad
        </button>

        <button class="mini-btn" style="width:100%;padding:13px;" onclick="handleShareMenuOption(${index}, 'txt')">
          TXT limpio
        </button>

        <button class="mini-btn" style="width:100%;padding:13px;" onclick="handleShareMenuOption(${index}, 'csv')">
          CSV de esta sesión
        </button>

        <button class="mini-btn" style="width:100%;padding:13px;" onclick="handleShareMenuOption(${index}, 'redes')">
          Redes sociales
        </button>

        <button class="mini-btn danger" style="width:100%;padding:13px;" onclick="closeShareMenu()">
          Cancelar
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  overlay.onclick = event => {
    if (event.target === overlay) closeShareMenu();
  };
}

async function handleShareMenuOption(index, type) {
  if (type === 'chad') {
    copyAnalysisTxt(index);
    closeShareMenu();
    return;
  }

  if (type === 'txt') {
    copySessionTxt(index);
    closeShareMenu();
    return;
  }

  if (type === 'csv') {
    exportSessionCsv(index);
    closeShareMenu();
    return;
  }

  if (type === 'redes') {
    await shareSessionSocialTxt(index);
    closeShareMenu();
  }
}

function formatSessionSocialTxt(session) {
  const totals = getSessionTotals(session);

  return [
    `${session.routineName} terminado 💥`,
    '',
    `Series: ${totals.doneSets}`,
    `Repeticiones: ${totals.totalReps}`,
    `Volumen: ${Math.round(totals.totalVolume).toLocaleString()} lb`,
    `Fecha: ${formatDateFull(new Date(session.date))}`
  ].join('\n');
}

async function shareSessionSocialTxt(index) {
  const session = getSessionByIndex(index);
  if (!session) return;

  const text = formatSessionSocialTxt(session);

  if (navigator.share) {
    try {
      await navigator.share({
        title: `${session.routineName} — ${formatDateForFile(session.date)}`,
        text
      });
      showToast('✅ Compartido');
      return;
    } catch (error) {
      if (error && error.name === 'AbortError') return;
      console.warn('shareSessionSocialTxt', error);
    }
  }

  const filename = `${safeFileName(session.routineName)}-${formatDateForFile(session.date)}-redes.txt`;
  copyTextToClipboard(text, '✅ Resumen para redes copiado', filename);
}
function exportSessions() {
  const sessions = getSessions();
  if (!sessions.length) {
    showToast('⚠️ No hay sesiones para exportar');
    return;
  }

  const dataStr = JSON.stringify(sessions.map(stripCloudMeta), null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');

  a.href = url;
  a.download = `forja-sesiones-${yyyy}-${mm}-${dd}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
  showToast('✅ Sesiones exportadas');
}

function csvEscape(value) {
  const text = String(value ?? '');
  return /[",\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
}

function exportSessionsCsv() {
  const sessions = getSessions();
  if (!sessions.length) {
    showToast('⚠️ No hay sesiones para exportar');
    return;
  }

  const rows = [['fecha','rutina','ejercicio','serie','peso_lb','repeticiones','volumen_lb','sustituye_a','notas']];
  sessions.map(stripCloudMeta).forEach(session => {
    session.exercises.forEach(ex => {
      ex.sets.forEach((set, index) => {
        if (!set.done && !set.weight && !set.reps) return;
        const weight = parseFloat(set.weight) || 0;
        const reps = parseFloat(set.reps) || 0;
        rows.push([
          session.date,
          session.routineName,
          ex.name,
          index + 1,
          set.weight || '',
          set.reps || '',
          weight * reps,
          ex.replaced ? (ex.originalName || '') : '',
          ex.notes || ''
        ]);
      });
    });
  });

  const csv = rows.map(row => row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');

  a.href = url;
  a.download = `forja-sesiones-${yyyy}-${mm}-${dd}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSV exportado');
}

async function initApp() {
  await renderAuthStatus();
  if (currentUser) {
    await loadCloudSessions();
    setSessionsLocal(dedupeSessions(cloudSessions));
  } else {
    setSessionsLocal(dedupeSessions(getSessionsLocal()));
  }
  renderHome();
  renderHistory();
  renderProfile();
}

initApp();
</script>
