<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="#0b0314" name="theme-color"/>
<meta content="dark" name="color-scheme"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<title>FORJA — Bitácora de entrenamiento</title>
<link href="forja-icon.png?v=11" rel="icon" sizes="512x512" type="image/png"/>
<link href="forja-icon.png?v=11" rel="apple-touch-icon" sizes="180x180"/>
<link href="manifest.webmanifest?v=11" rel="manifest"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #12051f;
    --bg2: #1a0b2b;
    --surface: rgba(33, 17, 49, 0.88);
    --surface-strong: rgba(40, 22, 60, 0.96);
    --surface-soft: rgba(255,255,255,0.04);
    --surface2: #241238;
    --border: rgba(205, 180, 120, 0.12);
    --border-strong: rgba(205, 180, 120, 0.22);
    --accent: #c9a44c;
    --accent2: #8f5a2f;
    --accent-soft: rgba(201, 164, 76, 0.12);
    --text: #f7f2ea;
    --muted: #a89cb8;
    --danger: #ff5d68;
    --success: #47ff8a;
    --shadow: 0 18px 48px rgba(0,0,0,0.34);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    background:
      radial-gradient(circle at top, rgba(201,164,76,0.08), transparent 22%),
      linear-gradient(180deg, #0d0418 0%, #12051f 25%, #170826 100%);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
    background:
      radial-gradient(circle at top left, rgba(201,164,76,0.08), transparent 28%),
      radial-gradient(circle at top right, rgba(143,90,47,0.10), transparent 24%),
      linear-gradient(180deg, #0d0418 0%, #12051f 20%, #18092b 100%);
  }

  .header {
    background: rgba(18,5,31,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 0.95;
    text-shadow: 0 6px 22px rgba(201,164,76,0.18);
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.3px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .nav {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 12px 16px 0;
    padding: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 18px;
    position: sticky;
    top: 82px;
    z-index: 99;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .nav-btn {
    flex: initial;
    padding: 11px 6px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.18s ease;
  }

  .nav-btn.active {
    color: #12051f;
    background: linear-gradient(180deg, #d8b35a 0%, #b88d31 100%);
    box-shadow: 0 10px 24px rgba(201,164,76,0.22);
  }

  .screen {
    display: none;
    padding: 18px 18px 110px;
    overflow-y: auto;
  }

  .screen.active {
    display: block;
    overflow-y: auto;
    height: calc(100vh - 132px);
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 2px;
    color: #d1c5df;
    margin-bottom: 14px;
    margin-top: 6px;
    margin-left: 4px;
  }

  .routine-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .routine-card,
  .exercise-card,
  .history-card {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%),
      rgba(31, 14, 46, 0.86);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .routine-card {
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.18s ease, border-color 0.18s ease;
  }

  .routine-card:active {
    transform: scale(0.985);
    border-color: var(--border-strong);
  }

  .routine-emoji {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    font-size: 28px;
    background: linear-gradient(180deg, rgba(201,164,76,0.18), rgba(201,164,76,0.08));
    border: 1px solid rgba(201,164,76,0.18);
    flex-shrink: 0;
  }

  .routine-info { flex: 1; }

  .routine-name {
    font-weight: 700;
    font-size: 17px;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }

  .routine-meta {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.35;
  }

  .session-header {
    margin-bottom: 20px;
    padding: 4px 4px 0;
  }

  .session-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
    line-height: 0.95;
  }

  .session-date {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 2px 0;
    margin-bottom: 16px;
  }

  .exercise-card,
  .history-card {
    margin-bottom: 14px;
    overflow: hidden;
  }

  .exercise-header {
    padding: 15px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .exercise-name {
    font-weight: 700;
    font-size: 14px;
    line-height: 1.25;
  }

  .prev-badge {
    font-size: 10px;
    color: #1b1000;
    background: linear-gradient(180deg, #dfbb63 0%, #c39a43 100%);
    padding: 4px 8px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .prev-info {
    padding: 9px 16px;
    background: var(--accent-soft);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .prev-info span {
    color: #e8c779;
    font-weight: 600;
  }

  .sets-table { padding: 14px 16px 16px; }

  .sets-header {
    display: grid;
    grid-template-columns: 30px 1fr 1fr 38px;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
  }

  .set-row {
    display: grid;
    grid-template-columns: 30px 1fr 1fr 38px;
    gap: 8px;
    margin-bottom: 9px;
    align-items: center;
  }

  .set-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-align: center;
  }

  .set-input,
  .notes-input,
  input[type="email"],
  input[type="password"] {
    background: rgba(10, 4, 18, 0.52);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 11px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    -webkit-appearance: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .set-input { text-align: center; }

  .set-input:focus,
  .notes-input:focus,
  input[type="email"]:focus,
  input[type="password"]:focus {
    outline: none;
    border-color: rgba(201,164,76,0.55);
    box-shadow: 0 0 0 3px rgba(201,164,76,0.10);
  }

  .set-input.completed {
    border-color: rgba(71,255,138,0.55);
    color: var(--success);
  }

  .set-check {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.2s;
    color: var(--muted);
  }

  .set-check.done {
    background: linear-gradient(180deg, #47ff8a 0%, #2fdb72 100%);
    border-color: transparent;
    color: #03130a;
    box-shadow: 0 8px 18px rgba(71,255,138,0.20);
  }

  .add-set-btn {
    width: 100%;
    padding: 11px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(201,164,76,0.24);
    border-radius: 14px;
    color: #d8c089;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 7px;
    transition: all 0.18s ease;
  }

  .finish-btn {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 34px);
    max-width: 446px;
    padding: 16px;
    background: linear-gradient(180deg, #ddb965 0%, #bc9138 100%);
    color: #140813;
    border: none;
    border-radius: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 18px 34px rgba(201,164,76,0.20);
  }

  .finish-btn:active { transform: translateX(-50%) scale(0.985); }

  .history-card {
    padding: 16px;
    cursor: pointer;
  }

  .history-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .history-name {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
    margin-right: 10px;
  }

  .history-date {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }

  .history-stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .history-stat {
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 999px;
    padding: 6px 10px;
  }

  .history-stat strong {
    color: var(--text);
    font-weight: 700;
  }

  .detail-set {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
  }

  .detail-set-num {
    width: 24px;
    height: 24px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
  }

  .detail-set-data { flex: 1; }
  .detail-set-weight { font-weight: 700; }
  .detail-set-reps { color: var(--muted); font-size: 12px; }

  .empty {
    text-align: center;
    padding: 74px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 50px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.7; }

  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(180deg, #47ff8a 0%, #2fdb72 100%);
    color: #06170d;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
    box-shadow: 0 14px 28px rgba(71,255,138,0.16);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .rest-timer {
    position: static;
    display: none;
    margin-top: -2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: 1.2px;
    color: #a56dff;
    background: none;
    padding: 0;
    border: none;
    border-radius: 0;
    cursor: default;
    text-shadow: 0 0 18px rgba(165,109,255,0.28), 0 0 36px rgba(121,74,255,0.18);
    z-index: 150;
    user-select: none;
    -webkit-user-select: none;
  }

  .rest-timer.visible { display: block; }

  .notes-input {
    resize: none;
    margin-top: 8px;
    min-height: 64px;
  }

  button {
    transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
  }

  button:active {
    transform: scale(0.985);
  }



  #sessionScreen {
    padding-top: 12px;
    background:
      radial-gradient(circle at top, rgba(201,164,76,0.06), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,0.01) 0%, transparent 20%);
  }

  .session-header {
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 16px 16px 14px;
    margin-bottom: 16px;
    box-shadow: 0 14px 28px rgba(0,0,0,0.22);
  }

  .session-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(201,164,76,0.12);
    border: 1px solid rgba(201,164,76,0.16);
    color: #e6c26b;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    margin-bottom: 12px;
  }

  .session-overview {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
      rgba(23, 10, 37, 0.92);
    border: 1px solid var(--border-strong);
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 18px 42px rgba(0,0,0,0.28);
  }

  .session-overview-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .session-overview-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1.4px;
    color: var(--text);
    line-height: 0.95;
  }

  .session-overview-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
  }

  .session-progress-ring {
    min-width: 58px;
    height: 58px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, rgba(201,164,76,0.22), rgba(201,164,76,0.08));
    border: 1px solid rgba(201,164,76,0.18);
    color: var(--accent);
    font-weight: 700;
    font-size: 16px;
  }

  .session-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .session-stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 12px;
  }

  .session-stat-label {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .session-stat-value {
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
  }

  .training-card {
    position: relative;
    overflow: hidden;
  }

  .training-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: linear-gradient(180deg, #dfbb63 0%, rgba(223,187,99,0.08) 100%);
    opacity: 0.9;
  }

  .exercise-header {
    padding: 16px 16px 12px 18px;
  }

  .exercise-topline {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .exercise-index {
    width: 28px;
    height: 28px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: rgba(201,164,76,0.12);
    border: 1px solid rgba(201,164,76,0.16);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .exercise-title-block {
    min-width: 0;
  }

  .exercise-name {
    font-size: 15px;
    letter-spacing: -0.2px;
  }

  .exercise-submeta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
  }

  .exercise-tools {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 16px 0 18px;
  }

  .ghost-link {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
  }

  .ghost-link:hover { color: var(--text); }

  .sets-table {
    padding: 14px 16px 14px 18px;
  }

  .sets-header {
    margin-bottom: 10px;
    color: #8f83a1;
  }

  .set-row {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 8px;
    margin-bottom: 9px;
  }

  .set-num {
    width: 26px;
    height: 26px;
    border-radius: 9px;
    background: rgba(255,255,255,0.045);
    display: grid;
    place-items: center;
    font-size: 12px;
    margin: 0 auto;
  }

  .set-input {
    height: 42px;
    border-radius: 12px;
    background: rgba(15, 8, 24, 0.78);
    border-color: rgba(255,255,255,0.05);
  }

  .set-check {
    width: 36px;
    height: 36px;
    border-radius: 12px;
  }

  .add-set-btn {
    border-style: solid;
    border-color: rgba(201,164,76,0.14);
    background: rgba(201,164,76,0.08);
    color: #e5c16a;
    height: 42px;
    font-weight: 600;
  }

  .notes-shell {
    padding: 0 16px 16px 18px;
  }

  .notes-input {
    min-height: 72px;
    border-radius: 14px;
    background: rgba(15, 8, 24, 0.74);
    border-color: rgba(255,255,255,0.05);
  }

  .session-preview-card {
    padding: 16px 18px;
  }

  .session-preview-meta {
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 390px) {
    .nav-btn { font-size: 16px; }
    .header-title { font-size: 34px; }
    .finish-btn { font-size: 20px; }
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }


  .dashboard-hero,
  .profile-shell,
  .detail-shell {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%),
      rgba(31, 14, 46, 0.86);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .dashboard-hero {
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .dashboard-hero::after,
  .profile-shell::after,
  .detail-shell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, rgba(201,164,76,0.14), transparent 34%);
    pointer-events: none;
  }

  .dashboard-hero-top,
  .profile-head,
  .detail-head {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(201, 164, 76, 0.12);
    border: 1px solid rgba(201, 164, 76, 0.16);
    padding: 5px 9px;
    border-radius: 999px;
    margin-bottom: 10px;
  }

  .hero-title,
  .profile-name,
  .detail-title {
    font-family: 'Bebas Neue', sans-serif;

/* === FORJA: ENTRENAMIENTO ACTIVO — VERSION ESTABLE 2026-05-20 === */

/* Regla base: si la pantalla de sesión no está abierta, su botón no aparece */
#sessionScreen:not(.active) .finish-btn {
  display: none !important;
}

#sessionScreen.active .finish-btn {
  display: block;
}

/* Antes de iniciar entrenamiento: NO mostrar Volver/Descartar */
#sessionScreen .session-legacy-actions {
  display: none !important;
}

body.training-active {
  overflow: hidden !important;
}

/* En entrenamiento se oculta navegación, no el temporizador */
body.training-active .nav {
  display: none !important;
}

body.training-active .header {
  display: block !important;
  position: fixed !important;
  inset: 0 0 auto 0 !important;
  width: 100% !important;
  max-width: 480px !important;
  height: 0 !important;
  min-height: 0 !important;
  margin: 0 auto !important;
  padding: 0 !important;
  border: 0 !important;
  background: transparent !important;
  overflow: visible !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  z-index: 3600 !important;
  pointer-events: none !important;
}

body.training-active .brand {
  display: none !important;
}

/* Temporizador visible durante entrenamiento cuando una serie activa el descanso */
body.training-active .timer-wrap {
  display: flex !important;
  position: fixed !important;
  top: calc(env(safe-area-inset-top, 0px) + 10px) !important;
  right: max(12px, calc((100vw - 480px) / 2 + 12px)) !important;
  z-index: 3700 !important;
  align-items: flex-end !important;
  pointer-events: auto !important;
}

body.training-active .rest-timer.visible {
  display: block !important;
}

body.training-active .timer-controls.visible {
  display: flex !important;
}

/* Pantalla de entrenamiento completa, limpia y estable */
body.training-active #sessionScreen.screen.active {
  display: block !important;
  position: fixed !important;
  inset: 0 !important;
  left: 0 !important;
  right: 0 !important;
  transform: none !important;
  width: min(100vw, 480px) !important;
  max-width: 480px !important;
  height: 100dvh !important;
  margin: 0 auto !important;
  padding: 0 0 calc(env(safe-area-inset-bottom, 0px) + 24px) !important;
  z-index: 3000 !important;
  overflow-y: auto !important;
  overscroll-behavior-y: contain !important;
  background:
    radial-gradient(circle at top, rgba(201,164,76,0.05), transparent 26%),
    linear-gradient(180deg, #12051f 0%, #170826 100%) !important;
}

/* Durante entrenamiento: mostrar solo DESCARTAR, pequeño, arriba */
body.training-active #sessionScreen .session-legacy-actions {
  display: flex !important;
  position: sticky !important;
  top: calc(env(safe-area-inset-top, 0px) + 8px) !important;
  z-index: 3500 !important;
  justify-content: flex-start !important;
  align-items: center !important;
  gap: 0 !important;
  margin: 0 !important;
  padding: 8px 12px 0 !important;
  background: transparent !important;
  pointer-events: auto !important;
}

body.training-active #sessionScreen .session-legacy-actions button:first-child {
  display: none !important;
}

body.training-active #sessionScreen .session-legacy-actions button:last-child {
  display: inline-flex !important;
  flex: 0 0 auto !important;
  width: auto !important;
  padding: 8px 12px !important;
  border-radius: 999px !important;
  background: rgba(255, 93, 104, 0.13) !important;
  border: 1px solid rgba(255, 93, 104, 0.35) !important;
  color: #ffd8dc !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  letter-spacing: 0.6px !important;
  line-height: 1 !important;
  box-shadow: none !important;
  transform: none !important;
}

body.training-active .session-header {
  margin: 0 !important;
  padding: 15px 16px 13px !important;
  border: 0 !important;
  border-bottom: 1px solid rgba(255,255,255,0.06) !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

body.training-active .session-title {
  font-size: 34px !important;
  line-height: 0.95 !important;
}

body.training-active .session-date {
  font-size: 11px !important;
}

body.training-active .session-kicker {
  padding: 0 !important;
  margin-bottom: 8px !important;
  border: 0 !important;
  background: transparent !important;
}

body.training-active .session-overview {
  display: none !important;
}

body.training-active .exercise-card.training-card {
  margin: 0 0 10px !important;
  border-left: 0 !important;
  border-right: 0 !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}

body.training-active .training-card::before {
  width: 3px !important;
}

body.training-active .exercise-header,
body.training-active .exercise-tools,
body.training-active .sets-table,
body.training-active .notes-shell {
  padding-left: 16px !important;
  padding-right: 16px !important;
}

body.training-active .analysis-box,
body.training-active .prev-info {
  border-left: 0 !important;
  border-right: 0 !important;
  border-radius: 0 !important;
}

/* Terminar sesión: al final real del entrenamiento, NO flotante */
body.training-active .finish-btn {
  position: static !important;
  left: auto !important;
  right: auto !important;
  bottom: auto !important;
  transform: none !important;
  width: calc(100% - 32px) !important;
  max-width: none !important;
  margin: 24px 16px calc(env(safe-area-inset-bottom, 0px) + 28px) !important;
  padding: 16px !important;
  border-radius: 18px !important;
  background: linear-gradient(180deg, #ddb965 0%, #bc9138 100%) !important;
  color: #140813 !important;
  box-shadow: 0 12px 28px rgba(201,164,76,0.18) !important;
  z-index: auto !important;
}

body.training-active .finish-btn:active {
  transform: scale(0.985) !important;
}

body.training-active .finish-btn::before,
body.training-active .finish-btn::after {
  display: none !important;
}

function cloneData(value) {
  return JSON.parse(JSON.stringify(value));
}

function normalizeText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .trim();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

  return cloneData(DEFAULT_ROUTINES);
}

function getTodayRoutine() {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const today = days[new Date().getDay()];

}

function getRoutineById(routineId) {

}

function getValidSets(sets) {
  return (sets || []).filter(s => {
    const weight = parseFloat(s.weight);
    const reps = parseFloat(s.reps);
    return (s.done || s.weight || s.reps) && !Number.isNaN(weight) && !Number.isNaN(reps) && reps > 0;
  });
}

function getTotalReps(sets) {
  return getValidSets(sets).reduce((sum, s) => sum + (parseFloat(s.reps) || 0), 0);
}

function getVolume(sets) {
  return getValidSets(sets).reduce((sum, s) => sum + ((parseFloat(s.weight) || 0) * (parseFloat(s.reps) || 0)), 0);
}

function getBestSet(sets) {
  const valid = getValidSets(sets);
  if (!valid.length) return null;
  return valid.reduce((best, s) => {
    const score = (parseFloat(s.weight) || 0) * (parseFloat(s.reps) || 0);
    const bestScore = (parseFloat(best.weight) || 0) * (parseFloat(best.reps) || 0);
    return score > bestScore ? s : best;
  }, valid[0]);
}

function getExerciseInsight(lastEx, currentEx) {
  if (!lastEx) {
    return `
      <div class="analysis-box">
        <div class="analysis-title">Objetivo de hoy</div>
        <div class="analysis-text">Primer registro de este ejercicio. Usa un peso controlable, deja 1–2 repeticiones en reserva y guarda datos limpios.</div>
      </div>
    `;
  }

  const lastSets = getValidSets(lastEx.sets);
  if (!lastSets.length) {
    return `
      <div class="analysis-box">
        <div class="analysis-title">Objetivo de hoy</div>
        <div class="analysis-text">La sesión anterior no tiene series completas confiables. Registra peso y repeticiones reales antes de buscar subir carga.</div>
      </div>
    `;
  }

  const lastReps = getTotalReps(lastEx.sets);
  const lastVolume = Math.round(getVolume(lastEx.sets));
  const best = getBestSet(lastEx.sets);
  const targetReps = lastReps + 1;
  const bestText = best ? `${best.weight} lb × ${best.reps}` : 'sin mejor serie';

  return `
    <div class="analysis-box">
      <div class="analysis-title">Objetivo de hoy</div>
      <div class="analysis-text">
        Anterior: ${lastSets.length} series, ${lastReps} repeticiones totales, ${lastVolume.toLocaleString()} lb de volumen. Mejor serie: ${bestText}.<br>
        Hoy intenta mínimo ${targetReps} repeticiones totales con técnica limpia. Sube peso solo si completas todas las series sin perder control.
      </div>
    </div>
  `;
}

function stripCloudMeta(session) {
  if (!session) return session;
  const copy = JSON.parse(JSON.stringify(session));
  delete copy._cloudId;
  delete copy.routine_name;
  delete copy.routine_id;
  return copy;
}

function normalizeSession(session) {
  if (!session || typeof session !== 'object') return null;
  const source = session.data_json && typeof session.data_json === 'object' ? session.data_json : session;
  if (!source || typeof source !== 'object') return null;
  const copy = JSON.parse(JSON.stringify(source));
  copy.routineName = copy.routineName || copy.routine_name || session.routine_name || copy.name || '';
  copy.routineId = copy.routineId || copy.routine_id || session.routine_id || '';
  copy.date = copy.date || session.date || copy.finishedAt || copy.createdAt || copy.startedAt || '';
  if (!copy.routineName || !copy.date || !Array.isArray(copy.exercises)) return null;
  copy.exercises = copy.exercises.map(ex => ({ ...ex, sets: Array.isArray(ex.sets) ? ex.sets : [] }));
  delete copy._cloudId;
  delete copy.routine_name;
  delete copy.routine_id;
  return copy;
}

function sessionKey(session) {
  const s = normalizeSession(session);
  return s ? `${s.routineName}__${s.date}` : '';
}

function doneSetsCount(session) {
  const s = normalizeSession(session);
  if (!s) return 0;
  return s.exercises.reduce((acc, ex) => acc + ex.sets.filter(st => st && st.done).length, 0);
}

function getActiveDraftSession() {
  try {
    const raw = JSON.parse(localStorage.getItem(CURRENT_SESSION_KEY) || 'null');
    return normalizeSession(raw?.session || raw);
  } catch {
    return null;
  }
}

function getSessionStatus(session) {
  const s = normalizeSession(session);
  return String(s?.status || s?.sessionStatus || '').toLowerCase();
}

function isActiveCloudSession(session) {
  const s = normalizeSession(session);
  if (!s) return false;
  const status = getSessionStatus(s);
  return s.inProgress === true || s.isActive === true || status === 'active' || status === 'in_progress' || status === 'en_curso';
}

function markActiveSession(session) {
  const clean = stripCloudMeta(normalizeSession(session));
  if (!clean) return null;
  clean.status = 'active';
  clean.inProgress = true;
  clean.updatedAt = new Date().toISOString();
  delete clean.finishedAt;
  return clean;
}

function markFinishedSession(session) {
  const clean = stripCloudMeta(normalizeSession(session));
  if (!clean) return null;
  clean.status = 'finished';
  clean.inProgress = false;
  clean.finishedAt = clean.finishedAt || new Date().toISOString();
  clean.updatedAt = new Date().toISOString();
  return clean;
}

function isValidHistorySession(session) {
  const s = normalizeSession(session);
  if (!s) return false;
  return isActiveCloudSession(s) || doneSetsCount(s) > 0;
}

function scoreSessionForDedupe(session) {
  const s = normalizeSession(session);
  if (!s) return -1;
  const activeBonus = isActiveCloudSession(s) ? 1000000 : 0;
  const doneBonus = doneSetsCount(s) * 1000;
  const updated = Date.parse(s.updatedAt || s.finishedAt || s.date || 0) || 0;
  return activeBonus + doneBonus + updated / 1000000000000;
}

function dedupeSessions(sessions) {
  const map = new Map();
  for (const item of sessions || []) {
    const session = normalizeSession(item);
    if (!session || !isValidHistorySession(session)) continue;
    const key = sessionKey(session);
    if (!key) continue;
    const current = map.get(key);
    if (!current || scoreSessionForDedupe(session) >= scoreSessionForDedupe(current)) {
      map.set(key, session);
    }
  }
  return Array.from(map.values()).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function readSessionsArrayFromStorageKey(key) {
  try {
    const raw = JSON.parse(localStorage.getItem(key) || '[]');
    return Array.isArray(raw) ? raw : [];
  } catch {
    return [];
  }
}

function getSessionsLocal() {

function getLegacyLocalSessionsForCloudMigration() {
  /* Migración automática una sola vía: local antiguo -> Supabase.
     No lee gymlog_current_session para no meter entrenamientos en curso al historial. */
  const legacy = [
    ...readSessionsArrayFromStorageKey('gymlog_sessions'),
    ...readSessionsArrayFromStorageKey('forja_sessions')
  ];
  return dedupeSessions(legacy);
}

function setSessionsLocal(sessions) {
  /* Solo caché de lectura rápida / respaldo. El historial oficial vive en Supabase. */
  localStorage.setItem('gymlog_sessions', JSON.stringify(dedupeSessions(sessions).map(stripCloudMeta)));
}

function getSessions() {
  /* Supabase es la fuente oficial. La sesión en curso también vive en Supabase
     y debe verse en Historial en cualquier navegador con la misma cuenta. */

    const live = currentSession && isActiveCloudSession(currentSession) ? [currentSession] : [];
    return dedupeSessions([...(cloudSessions || []), ...live]);
  }
  return getSessionsLocal();
}

function getFinishedSessions() {
  return getSessions().filter(s => !isActiveCloudSession(s));
}

function getLastSession(routineId) {

async function loadCloudSessions() {
  if (!currentUser) {
    cloudSessions = [];
    return [];
  }

  const { data, error } = await supabaseClient
    .from('sessions')
    .select('id, routine_id, routine_name, date, data_json')
    .eq('user_id', currentUser.id)
    .order('date', { ascending: false });

  if (error) {
    console.error('loadCloudSessions', error);
    showToast('❌ ' + error.message);
    return cloudSessions || [];
  }

  cloudSessions = dedupeSessions((data || []).map(row => ({
    ...(row.data_json || {}),
    _cloudId: row.id,
    routineId: row.data_json?.routineId || row.routine_id,
    routineName: row.data_json?.routineName || row.routine_name,
    date: row.data_json?.date || row.date,
  })));

  setSessionsLocal(cloudSessions);
  return cloudSessions;
}

async function syncLocalSessionsToCloud() {
  if (!currentUser) return true;

  const legacyLocalSessions = getLegacyLocalSessionsForCloudMigration();

  const { data: existingRows, error: fetchError } = await supabaseClient
    .from('sessions')
    .select('id, routine_name, date')
    .eq('user_id', currentUser.id);

  if (fetchError) {
    console.error('syncLocalSessionsToCloud', fetchError);
    showToast('❌ ' + fetchError.message);
    await loadCloudSessions();
    return false;
  }

  const existingKeys = new Set(
    (existingRows || []).map(row => `${row.routine_name}__${row.date}`)
  );

  const rows = legacyLocalSessions
    .filter(session => !existingKeys.has(sessionKey(session)))
    .map(session => {
      const clean = stripCloudMeta(session);
      return {
        user_id: currentUser.id,
        routine_id: clean.routineId,
        routine_name: clean.routineName,
        date: clean.date,
        data_json: clean,
      };
    });

  if (rows.length) {
    const { error } = await supabaseClient.from('sessions').insert(rows);
    if (error) {
      console.error('syncLocalSessionsToCloud insert', error);
      showToast('❌ ' + error.message);
      await loadCloudSessions();
      return false;
    }
  }

  await loadCloudSessions();
  return true;
}

let currentSessionCloudTimer = null;
let currentSessionCloudSaving = false;

function queueCurrentSessionCloudSave(immediate = false) {
  if (!currentUser || !currentSession || !isActiveCloudSession(currentSession)) return;
  clearTimeout(currentSessionCloudTimer);
  const run = () => saveActiveSessionToCloud();
  if (immediate) run();
  else currentSessionCloudTimer = setTimeout(run, 450);
}

async function saveActiveSessionToCloud() {
  if (!currentUser || !currentSession || currentSessionCloudSaving) return false;
  const cleanSession = markActiveSession(currentSession);
  if (!cleanSession) return false;

  currentSessionCloudSaving = true;
  try {
    const { data: existing, error: checkError } = await supabaseClient
      .from('sessions')
      .select('id')
      .eq('user_id', currentUser.id)
      .eq('routine_name', cleanSession.routineName)
      .eq('date', cleanSession.date)
      .limit(1);

    if (checkError) throw checkError;

    if (existing && existing.length > 0) {
      const existingId = existing[0].id;
      const { error } = await supabaseClient
        .from('sessions')
        .update({
          routine_id: cleanSession.routineId,
          routine_name: cleanSession.routineName,
          date: cleanSession.date,
          data_json: cleanSession,
        })
        .eq('user_id', currentUser.id)
        .eq('id', existingId);
      if (error) throw error;
      cleanSession._cloudId = existingId;
    } else {
      const { data, error } = await supabaseClient
        .from('sessions')
        .insert({
          user_id: currentUser.id,
          routine_id: cleanSession.routineId,
          routine_name: cleanSession.routineName,
          date: cleanSession.date,
          data_json: cleanSession,
        })
        .select('id')
        .single();
      if (error) throw error;
      cleanSession._cloudId = data?.id || null;
    }

    currentSession = { ...currentSession, ...cleanSession };
    cloudSessions = dedupeSessions([...(cloudSessions || []), cleanSession]);
    setSessionsLocal(cloudSessions);
    return true;
  } catch (error) {
    console.error('saveActiveSessionToCloud', error);
    return false;
  } finally {
    currentSessionCloudSaving = false;
  }
}

async function saveSession(session) {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return false;
  }

  const cleanSession = markFinishedSession(session);
  if (!cleanSession || doneSetsCount(cleanSession) === 0) {
    showToast('⚠️ No hay series terminadas para guardar');
    return false;
  }

  const { data: existing, error: checkError } = await supabaseClient
    .from('sessions')
    .select('id')
    .eq('user_id', currentUser.id)
    .eq('routine_name', cleanSession.routineName)
    .eq('date', cleanSession.date)
    .limit(1);

  if (checkError) {
    console.error('saveSession check', checkError);
    showToast('❌ ' + checkError.message);
    return false;
  }

  if (existing && existing.length > 0) {
    const existingId = existing[0].id;
    const { error } = await supabaseClient
      .from('sessions')
      .update({
        routine_id: cleanSession.routineId,
        routine_name: cleanSession.routineName,
        date: cleanSession.date,
        data_json: cleanSession,
      })
      .eq('user_id', currentUser.id)
      .eq('id', existingId);

    if (error) {
      console.error('saveSession update', error);
      showToast('❌ ' + error.message);
      return false;
    }
  } else {
    const { error } = await supabaseClient
      .from('sessions')
      .insert({
        user_id: currentUser.id,
        routine_id: cleanSession.routineId,
        routine_name: cleanSession.routineName,
        date: cleanSession.date,
        data_json: cleanSession,
      });

    if (error) {
      console.error('saveSession insert', error);
      showToast('❌ ' + error.message);
      return false;
    }
  }

  await loadCloudSessions();
  return true;
}

function makeSessionRef(session) {
  return {
    cloudId: session?._cloudId || null,
    routineName: session?.routineName || '',
    date: session?.date || ''
  };
}

function sameSessionRef(session, ref) {
  return session && ref && session.routineName === ref.routineName && session.date === ref.date;
}

async function updateSavedSession(originalRef, updatedSession) {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return false;
  }

  const cleanSession = markFinishedSession(updatedSession);
  if (!cleanSession || doneSetsCount(cleanSession) === 0) {
    showToast('⚠️ No hay series terminadas para guardar');
    return false;
  }

  let query = supabaseClient
    .from('sessions')
    .update({
      routine_id: cleanSession.routineId,
      routine_name: cleanSession.routineName,
      date: cleanSession.date,
      data_json: cleanSession,
    })
    .eq('user_id', currentUser.id);

  if (originalRef?.cloudId) {
    query = query.eq('id', originalRef.cloudId);
  } else {
    query = query.eq('routine_name', originalRef.routineName).eq('date', originalRef.date);
  }

  const { error } = await query;

  if (error) {
    console.error('updateSavedSession', error);
    showToast('❌ ' + error.message);
    return false;
  }

  await loadCloudSessions();
  return true;
}

function toDateInputValue(iso) {
  const d = new Date(iso);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function fromDateInputValue(value, originalIso) {
  const parts = String(value || '').split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return originalIso || new Date().toISOString();
  const old = originalIso ? new Date(originalIso) : new Date();
  const hour = Number.isNaN(old.getHours()) ? 12 : old.getHours();
  const minute = Number.isNaN(old.getMinutes()) ? 0 : old.getMinutes();
  const second = Number.isNaN(old.getSeconds()) ? 0 : old.getSeconds();
  return new Date(parts[0], parts[1] - 1, parts[2], hour, minute, second).toISOString();
}

function getYesterdayInputValue() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return toDateInputValue(d.toISOString());
}

function setCurrentSessionDate(value) {
  if (!currentSession || !value) return;
  currentSession.date = fromDateInputValue(value, currentSession.date);
  currentSession.updatedAt = new Date().toISOString();
  const label = document.getElementById('sessionDateLabel');
  if (label) label.textContent = formatDateFull(new Date(currentSession.date));
  saveCurrentDraft();
}

async function editSavedSession(index) {
  const session = getSessionByIndex(index);
  if (!session) return;
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return;
  }

  const active = isActiveCloudSession(session);
  editingSessionKey = makeSessionRef(session);
  currentSession = cloneData(stripCloudMeta(session));
  currentSession._cloudId = session._cloudId || null;
  if (active) currentSession = markActiveSession(currentSession);
  clearCurrentDraft();
  stopTimer();

  document.getElementById('sessionTitle').textContent = currentSession.routineName.toUpperCase();
  document.getElementById('sessionDate').innerHTML = active ? `
    <span class="session-kicker">Sesión en curso</span>
    <div id="sessionDateLabel">${formatDateFull(new Date(currentSession.date))}</div>
  ` : `
    <span class="session-kicker">Editando sesión guardada</span>
    <div id="sessionDateLabel">${formatDateFull(new Date(currentSession.date))}</div>
    <input type="date" class="form-input" style="margin-top:10px;" value="${toDateInputValue(currentSession.date)}" onchange="setCurrentSessionDate(this.value)">
  `;

  renderExercises();
  const finishBtn = document.querySelector('.finish-btn');
  finishBtn.textContent = active ? 'TERMINAR SESIÓN' : 'GUARDAR CAMBIOS';
  finishBtn.onclick = () => finishSession();

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

let trainingSwipeStartY = 0;
let trainingSwipeStartX = 0;
let trainingSwipeStartedAtTop = false;

function setupTrainingSwipeToHide() {
  const screen = document.getElementById('sessionScreen');
  if (!screen || screen.dataset.trainingSwipeReady === '1') return;
  screen.dataset.trainingSwipeReady = '1';

  screen.addEventListener('touchstart', event => {
    if (!document.body.classList.contains('training-active') || !currentSession) return;
    const touch = event.touches[0];
    trainingSwipeStartY = touch.clientY;
    trainingSwipeStartX = touch.clientX;
    trainingSwipeStartedAtTop = screen.scrollTop <= 8;
  }, { passive: true });

  screen.addEventListener('touchend', event => {
    if (!document.body.classList.contains('training-active') || !currentSession) return;
    const touch = event.changedTouches[0];
    const deltaY = touch.clientY - trainingSwipeStartY;
    const deltaX = Math.abs(touch.clientX - trainingSwipeStartX);

    if (trainingSwipeStartedAtTop && deltaY > 80 && deltaX < 90) {
      goBack();
    }
  }, { passive: true });
}

function showScreen(name) {
  if (!currentUser && name !== 'auth') {
    name = 'auth';
    showToast('🔒 Inicia sesión primero');
  }

  const goingToSession = name === 'session';

  if (currentSession && !goingToSession) {
    if (!editingSessionKey) saveCurrentDraft();
    stopTimer();
  }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  const targetScreen = document.getElementById(name + 'Screen');
  if (targetScreen) targetScreen.classList.add('active');

  if (name === 'session' && currentSession) enterTrainingMode();
  else exitTrainingMode();

  const navMap = { home: 0, history: 1, profile: 2, auth: 3 };
  if (navMap[name] !== undefined) {
    document.querySelectorAll('.nav-btn')[navMap[name]].classList.add('active');
  }

  if (name === 'history') {
    renderHistory();
    if (currentUser) loadCloudSessions().then(renderHistory);
  }
  if (name === 'home') {
    renderHome();
    if (currentUser) loadCloudSessions().then(renderHome);
  }
  if (name === 'profile') renderProfile();
  if (name === 'auth') renderAuthStatus();
}

async function deleteActiveCloudSession(session) {
  const s = normalizeSession(session);
  if (!currentUser || !s || !isActiveCloudSession(s)) return;
  try {
    const { error } = await supabaseClient
      .from('sessions')
      .delete()
      .eq('user_id', currentUser.id)
      .eq('routine_name', s.routineName)
      .eq('date', s.date);
    if (error) throw error;
    cloudSessions = dedupeSessions((cloudSessions || []).filter(item => sessionKey(item) !== sessionKey(s)));
    setSessionsLocal(cloudSessions);
  } catch (error) {
    console.error('deleteActiveCloudSession', error);
    showToast('❌ ' + error.message);
  }
}

async function discardSession() {
  if (editingSessionKey && !isActiveCloudSession(currentSession)) {
    currentSession = null;
    editingSessionKey = null;
    clearCurrentDraft();
    stopTimer();
    showScreen('history');
    return;
  }

  if (confirm('¿Descartar entrenamiento?')) {
    await deleteActiveCloudSession(currentSession);
    currentSession = null;
    editingSessionKey = null;
    clearCurrentDraft();
    stopTimer();
    showScreen('home');
  }
}

function goBack() {
  if (editingSessionKey) {
    currentSession = null;
    editingSessionKey = null;
    clearCurrentDraft();
    stopTimer();
    showScreen('history');
    return;
  }

  if (currentSession) {
    saveCurrentDraft();
    stopTimer();
    showToast('✅ Sesión guardada como borrador');
  }
  showScreen('home');
}

function startSession(routineId) {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return;
  }

  editingSessionKey = null;
  const routine = getRoutineById(routineId);
  if (!routine) { showToast('⚠️ Rutina no encontrada'); return; }

  const existingDraft = currentSession || getCurrentDraft();
  if (existingDraft) {
    const replace = confirm('Ya hay una sesión guardada. ¿Reemplazarla por una nueva sesión de ' + routine.name + '?');
    if (!replace) return;
    clearCurrentDraft();
    stopTimer();
  } else if (!confirm('¿Iniciar entrenamiento de ' + routine.name + '?')) {
    return;
  }

  currentSession = {
    routineId,
    routineName: routine.name,
    date: new Date().toISOString(),
    status: 'active',
    inProgress: true,
    updatedAt: new Date().toISOString(),
    exercises: routine.exercises.map(ex => {
      const lastEx = getLastExerciseData(routineId, ex.name);
      return {
        name: ex.name,
        originalName: ex.name,
        note: ex.note || null,
        replaced: false,
        sets: Array.from({ length: ex.sets }, (_, i) => {
          const lastSet = lastEx?.sets?.[i];
          return { weight: lastSet?.weight || '', reps: lastSet?.reps || '', done: false };
        })
      };
    })
  };

  currentSession = markActiveSession(currentSession);
  saveCurrentDraft();
  queueCurrentSessionCloudSave(true);
  renderHistory();
  document.getElementById('sessionTitle').textContent = routine.name.toUpperCase();
  document.getElementById('sessionDate').innerHTML = `<span class="session-kicker">Sesión en curso</span><div>${formatDateFull(new Date())}</div>`;
  renderExercises();

  document.querySelector('.finish-btn').textContent = 'TERMINAR SESIÓN';
  document.querySelector('.finish-btn').onclick = () => finishSession();

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('sessionScreen').classList.add('active');
  enterTrainingMode();
}

function addSet(ei) {
  const ex = currentSession.exercises[ei];
  const lastSet = ex.sets[ex.sets.length - 1];
  ex.sets.push({ weight: lastSet?.weight || '', reps: lastSet?.reps || '', done: false });
  saveCurrentDraft();
  renderExercises();
}

async function finishSession() {
  if (!currentUser) {
    showScreen('auth');
    showToast('🔒 Inicia sesión primero');
    return;
  }

  if (!currentSession) {
    showToast('⚠️ No hay una sesión activa');
    return;
  }

  const doneSets = currentSession.exercises.reduce((acc, ex) => acc + ex.sets.filter(s => s.done).length, 0);
  if (doneSets === 0) {
    showToast('⚠️ Marca al menos una serie como completada');
    return;
  }

  const wasEditing = !!editingSessionKey;
  const finishedSession = markFinishedSession(currentSession);
  const ok = wasEditing
    ? await updateSavedSession(editingSessionKey, finishedSession)
    : await saveSession(finishedSession);
  if (ok === false) return;

  currentSession = null;
  editingSessionKey = null;
  clearCurrentDraft();
  stopTimer();
  exitTrainingMode();
  showToast(wasEditing ? '✅ Cambios guardados' : '✅ Sesión guardada');
  const finishBtn = document.querySelector('.finish-btn');
  finishBtn.textContent = 'TERMINAR SESIÓN';
  finishBtn.onclick = () => finishSession();
  renderHome();
  renderHistory();
  setTimeout(() => { showScreen(wasEditing ? 'history' : 'home'); }, 900);
}

let forjaAudioReady = false;
let forjaLastUnlockTry = 0;

function unlockTimerAudio() {
  try {
    const nowMs = Date.now();
    if (forjaAudioReady && nowMs - forjaLastUnlockTry < 3000) return;
    forjaLastUnlockTry = nowMs;

    if (!audioCtx) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (AudioContextClass) audioCtx = new AudioContextClass();
    }

    if (!audioCtx) return;

    const finishUnlock = () => {
      try {
        /* Pulso casi silencioso: ayuda a iPhone a desbloquear Web Audio desde un toque real. */
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.00001, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.035);
        forjaAudioReady = true;
      } catch (e) {
        console.warn('finishUnlock', e);
      }
    };

    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(finishUnlock).catch(() => {});
    } else if (audioCtx.state === 'running') {
      finishUnlock();
    }
  } catch (e) {
    console.warn('unlockTimerAudio', e);
  }
}

function forjaAlarmTone(freq, delay, duration, volume) {
  if (!audioCtx || audioCtx.state !== 'running') return;

  const startAt = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'square';
  osc.frequency.setValueAtTime(freq, startAt);

  gain.gain.setValueAtTime(0.0001, startAt);
  gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startAt);
  osc.stop(startAt + duration + 0.04);
}

function playTimerBeep() {
  unlockTimerAudio();

  if (!audioCtx || audioCtx.state !== 'running') {
    showToast('🔕 Toca la pantalla y sube el volumen');
    return;
  }

  /* Alarma fuerte en dos ráfagas. */
  forjaAlarmTone(880, 0.00, 0.22, 0.42);
  forjaAlarmTone(1175, 0.28, 0.22, 0.42);
  forjaAlarmTone(1568, 0.56, 0.38, 0.48);
  forjaAlarmTone(880, 1.08, 0.22, 0.42);
  forjaAlarmTone(1175, 1.36, 0.22, 0.42);
  forjaAlarmTone(1568, 1.64, 0.48, 0.52);

  if (navigator.vibrate) {
    navigator.vibrate([300, 120, 300, 120, 500]);
  }
}

function handleTimerTick() {
  if (!timerEndTime) return;
  const remainingMs = timerEndTime - Date.now();
  if (remainingMs <= 0) {
    stopTimer();
    playTimerBeep();
    showToast('⏱ Descanso terminado — siguiente serie');
  } else {
    updateTimerDisplay();
  }
}

function startTimer(seconds) {
  stopTimer();
  unlockTimerAudio();
  timerPausedRemainingMs = null;
  timerEndTime = Date.now() + (seconds * 1000);
  const el = document.getElementById('timerDisplay');
  const controls = document.getElementById('timerControls');
  const pauseBtn = document.getElementById('timerPauseBtn');
  if (pauseBtn) pauseBtn.textContent = '⏸';
  if (el) el.classList.add('visible');
  if (controls) controls.classList.add('visible');
  updateTimerDisplay();
  timerInterval = setInterval(handleTimerTick, 250);
}

['touchstart', 'pointerdown', 'click'].forEach(type => {
  document.addEventListener(type, unlockTimerAudio, { passive: true });
});

function adjustTimer(seconds) {
  if (!timerEndTime && timerPausedRemainingMs === null) return;
  if (timerPausedRemainingMs !== null) {
    timerPausedRemainingMs = Math.max(0, timerPausedRemainingMs + (seconds * 1000));
  } else {
    timerEndTime = Math.max(Date.now(), timerEndTime + (seconds * 1000));
  }
  updateTimerDisplay();
}

function toggleTimerPause() {
  if (!timerEndTime && timerPausedRemainingMs === null) return;
  const pauseBtn = document.getElementById('timerPauseBtn');

  if (timerPausedRemainingMs !== null) {
    timerEndTime = Date.now() + timerPausedRemainingMs;
    timerPausedRemainingMs = null;
    clearInterval(timerInterval);
    timerInterval = setInterval(handleTimerTick, 250);
    if (pauseBtn) pauseBtn.textContent = '⏸';
  } else {
    timerPausedRemainingMs = Math.max(timerEndTime - Date.now(), 0);
    clearInterval(timerInterval);
    timerInterval = null;
    timerEndTime = null;
    if (pauseBtn) pauseBtn.textContent = '▶';
  }

  updateTimerDisplay();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerEndTime = null;
  timerPausedRemainingMs = null;
  const el = document.getElementById('timerDisplay');
  const controls = document.getElementById('timerControls');
  if (el) el.classList.remove('visible');
  if (controls) controls.classList.remove('visible');
}

function updateTimerDisplay() {
  const remainingMs = timerPausedRemainingMs !== null
    ? timerPausedRemainingMs
    : (timerEndTime ? Math.max(timerEndTime - Date.now(), 0) : 0);
  const totalSeconds = Math.ceil(remainingMs / 1000);
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

function getSummary(sets) {
  const done = sets.filter(s => s.done || s.weight);
  if (!done.length) return 'Sin datos';
  const w = done[0].weight;
  const avgR = Math.round(done.reduce((a, s) => a + (parseFloat(s.reps) || 0), 0) / done.length);
  return `${done.length} series · ${w} lbs · ~${avgR} reps`;
}

function formatDate(iso) {
  const d = new Date(iso);
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function formatDateFull(d) {
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]} ${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}


function formatDateForFile(iso) {
  const d = new Date(iso);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function safeFileName(text) {
  return String(text || 'forja')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'forja';
}

function getCompletedSets(exercise) {
  return (exercise.sets || []).filter(st => st.done);
}

function getSessionTotals(session) {
  const doneSets = session.exercises.reduce((acc, ex) => acc + getCompletedSets(ex).length, 0);
  const totalReps = session.exercises.reduce((acc, ex) => {
    return acc + getCompletedSets(ex).reduce((sum, st) => sum + (parseFloat(st.reps) || 0), 0);
  }, 0);
  const totalVolume = session.exercises.reduce((acc, ex) => {
    return acc + getCompletedSets(ex).reduce((sum, st) => {
      return sum + ((parseFloat(st.weight) || 0) * (parseFloat(st.reps) || 0));
    }, 0);
  }, 0);
  return { doneSets, totalReps, totalVolume, exercises: session.exercises.length };
}

function formatExerciseTxt(exercise) {
  const lines = [];
  const done = getCompletedSets(exercise);
  lines.push(exercise.name);

  if (!done.length) {
    lines.push('Sin series completadas.');
  } else {
    done.forEach((st, i) => {
      const weight = st.weight || '--';
      const reps = st.reps || '--';
      lines.push(`Serie ${i + 1}: ${weight} lb x ${reps} reps`);
    });
  }

  if (exercise.replaced && exercise.originalName) lines.push(`Sustituye a: ${exercise.originalName}`);
  if (exercise.notes) lines.push(`Notas: ${exercise.notes}`);
  return lines.join('\n');
}

function formatSessionTxt(session) {
  const totals = getSessionTotals(session);
  const lines = [];

  lines.push(session.routineName.toUpperCase());
  lines.push(formatDateFull(new Date(session.date)));
  lines.push('');
  lines.push(`Series completadas: ${totals.doneSets}`);
  lines.push(`Repeticiones totales: ${totals.totalReps}`);
  lines.push(`Volumen total: ${Math.round(totals.totalVolume).toLocaleString()} lb`);
  lines.push('');

  session.exercises.forEach((ex, i) => {
    lines.push(`EJERCICIO ${i + 1}`);
    lines.push(formatExerciseTxt(ex));
    lines.push('');
  });

  return lines.join('\n').trim();
}

function formatSessionCsv(session) {
  const rows = [['fecha','rutina','ejercicio','serie','peso_lb','repeticiones','volumen_lb','sustituye_a','notas']];

  session.exercises.forEach(ex => {
    getCompletedSets(ex).forEach((set, index) => {
      const weight = parseFloat(set.weight) || 0;
      const reps = parseFloat(set.reps) || 0;
      rows.push([
        formatDateForFile(session.date),
        session.routineName,
        ex.name,
        index + 1,
        set.weight || '',
        set.reps || '',
        weight * reps,
        ex.replaced ? (ex.originalName || '') : '',
        ex.notes || ''
      ]);
    });
  });

  return rows.map(row => row.map(csvEscape).join(',')).join('\n');
}

function formatCompactSession(session) {
  const totals = getSessionTotals(session);
  const lines = [];

  lines.push(`${session.routineName} — ${formatDateFull(new Date(session.date))}`);
  lines.push(`Resumen: ${totals.doneSets} series, ${totals.totalReps} reps, ${Math.round(totals.totalVolume).toLocaleString()} lb de volumen.`);
  lines.push('');

  session.exercises.forEach(ex => {
    const done = getCompletedSets(ex);
    const setsText = done.length
      ? done.map(st => `${st.weight || '--'} lb x ${st.reps || '--'}`).join(' | ')
      : 'sin series completadas';
    lines.push(`${ex.name}: ${setsText}`);
    if (ex.replaced && ex.originalName) lines.push(`Sustituye a: ${ex.originalName}`);
    if (ex.notes) lines.push(`Notas: ${ex.notes}`);
  });

  return lines.join('\n');
}

function formatAnalysisTxt(session) {
  const lines = [];

  lines.push('ANALIZA MI ENTRENAMIENTO');
  lines.push('');
  lines.push(`Rutina: ${session.routineName}`);
  lines.push(`Fecha: ${formatDateFull(new Date(session.date))}`);
  lines.push('Objetivo: ganar músculo, progresar sin sacrificar técnica.');
  lines.push('');
  lines.push('ENTRENAMIENTO ACTUAL:');
  lines.push(formatCompactSession(session));
  lines.push('');
  lines.push('Usa el historial que ya te he compartido en esta conversación. No incluyo sesión anterior para evitar duplicar datos.');
  lines.push('');
  lines.push('Dime exactamente:');
  lines.push('1. dónde progresé');
  lines.push('2. dónde bajé rendimiento');
  lines.push('3. qué debo intentar la próxima vez');
  lines.push('4. si debo subir, mantener o bajar peso en cada ejercicio');
  lines.push('5. qué correcciones técnicas debo cuidar');

  return lines.join('\n');
}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType || 'text/plain;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function copyTextToClipboard(text, successMessage, fallbackFilename) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (!ok) throw new Error('Copia bloqueada');
    }
    showToast(successMessage || '✅ Copiado');
  } catch (error) {
    console.warn('copyTextToClipboard', error);
    downloadTextFile(fallbackFilename || 'forja-entrenamiento.txt', text, 'text/plain;charset=utf-8;');
    showToast('⚠️ No se pudo copiar; descargué TXT');
  }
}

function getSessionByIndex(index) {
  const session = getSessions()[index];
  if (!session) showToast('⚠️ No encontré esa sesión');

}

function copySessionTxt(index) {

function copyAnalysisTxt(index) {
  const session = getSessionByIndex(index);

  copyTextToClipboard(formatAnalysisTxt(session), '✅ Texto para Chad copiado', filename);

function exportSessionCsv(index) {
  const session = getSessionByIndex(index);

  downloadTextFile(filename, '\uFEFF' + formatSessionCsv(session), 'text/csv;charset=utf-8;');

}

async function shareSessionTxt(index) {
  const session = getSessionByIndex(index);
  if (!session) return;
  const text = formatSessionTxt(session);

  if (navigator.share) {
    try {
      await navigator.share({
        title: `${session.routineName} — ${formatDateForFile(session.date)}`,
        text
      });
      showToast('✅ Compartido');
      return;
    } catch (error) {

async function handleShareMenuOption(index, type) {
  if (type === 'chad') {
    copyAnalysisTxt(index);
    closeShareMenu();
    return;
  }

  if (type === 'txt') {
    copySessionTxt(index);
    closeShareMenu();
    return;
  }

  if (type === 'csv') {
    exportSessionCsv(index);
    closeShareMenu();
    return;
  }

  if (type === 'redes') {
    await shareSessionSocialTxt(index);
    closeShareMenu();
  }
}

function formatSessionSocialTxt(session) {
  const totals = getSessionTotals(session);

  return [
    `${session.routineName} terminado 💥`,
    '',
    `Series: ${totals.doneSets}`,
    `Repeticiones: ${totals.totalReps}`,
    `Volumen: ${Math.round(totals.totalVolume).toLocaleString()} lb`,
    `Fecha: ${formatDateFull(new Date(session.date))}`
  ].join('\n');
}

async function shareSessionSocialTxt(index) {
  const session = getSessionByIndex(index);
  if (!session) return;

  const text = formatSessionSocialTxt(session);

  if (navigator.share) {
    try {
      await navigator.share({
        title: `${session.routineName} — ${formatDateForFile(session.date)}`,
        text
      });
      showToast('✅ Compartido');
      return;
    } catch (error) {
      if (error && error.name === 'AbortError') return;
      console.warn('shareSessionSocialTxt', error);
    }
  }

  const filename = `${safeFileName(session.routineName)}-${formatDateForFile(session.date)}-redes.txt`;
  copyTextToClipboard(text, '✅ Resumen para redes copiado', filename);
}
function exportSessions() {
  const sessions = getSessions();
  if (!sessions.length) {
    showToast('⚠️ No hay sesiones para exportar');
    return;
  }

  const dataStr = JSON.stringify(sessions.map(stripCloudMeta), null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');

  a.href = url;
  a.download = `forja-sesiones-${yyyy}-${mm}-${dd}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
  showToast('✅ Sesiones exportadas');
}

function csvEscape(value) {
  const text = String(value ?? '');
  return /[",\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
}

function exportSessionsCsv() {
  const sessions = getSessions();
  if (!sessions.length) {
    showToast('⚠️ No hay sesiones para exportar');
    return;
  }

  const rows = [['fecha','rutina','ejercicio','serie','peso_lb','repeticiones','volumen_lb','sustituye_a','notas']];
  sessions.map(stripCloudMeta).forEach(session => {
    session.exercises.forEach(ex => {
      ex.sets.forEach((set, index) => {
        if (!set.done && !set.weight && !set.reps) return;
        const weight = parseFloat(set.weight) || 0;
        const reps = parseFloat(set.reps) || 0;
        rows.push([
          session.date,
          session.routineName,
          ex.name,
          index + 1,
          set.weight || '',
          set.reps || '',
          weight * reps,
          ex.replaced ? (ex.originalName || '') : '',
          ex.notes || ''
        ]);
      });
    });
  });

  const csv = rows.map(row => row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');

  a.href = url;
  a.download = `forja-sesiones-${yyyy}-${mm}-${dd}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSV exportado');
}

function isBodyweightExerciseName(name) {
  const clean = normalizeText(name || '');
  return clean === 'fondo de triceps' || clean === 'fondos de triceps' || clean.includes('dominada') || clean === 'plancha';
}

function isBodyweightExercise(ex) {
  return !!(ex && (ex.bodyweight === true || isBodyweightExerciseName(ex.name)));
}

function displaySetWeight(set, exName) {
  if (isBodyweightExerciseName(exName)) return 'Peso corporal';
  return `${set.weight || 0} lbs`;
}

function getSummaryForExercise(sets, exName) {
  const done = (sets || []).filter(s => s.done || s.weight || s.reps);
  if (!done.length) return 'Sin datos';
  const avgR = Math.round(done.reduce((a, s) => a + (parseFloat(s.reps) || 0), 0) / done.length);
  if (isBodyweightExerciseName(exName)) return `${done.length} series · peso corporal · ~${avgR} reps`;
  const w = done[0].weight;
  return `${done.length} series · ${w} lbs · ~${avgR} reps`;
}

let forjaTimerInterval = null;
let forjaTimerState = { active:false, endAt:null, pausedMs:null };
const FORJA_TIMER_KEY = 'forja_rest_timer_state_v3';

function readStoredTimer() {
  try {
    const saved = JSON.parse(localStorage.getItem(FORJA_TIMER_KEY) || 'null');
    if (saved && saved.active) forjaTimerState = saved;
  } catch {}
}

function saveStoredTimer() {
  if (!forjaTimerState.active) localStorage.removeItem(FORJA_TIMER_KEY);
  else localStorage.setItem(FORJA_TIMER_KEY, JSON.stringify(forjaTimerState));
}

function timerRemainingMs() {
  if (!forjaTimerState.active) return 0;
  if (forjaTimerState.pausedMs !== null) return Math.max(0, forjaTimerState.pausedMs || 0);
  if (!forjaTimerState.endAt) return 0;
  return Math.max(0, forjaTimerState.endAt - Date.now());
}

function renderTimer() {
  const wrap = document.querySelector('.timer-wrap');
  const display = document.getElementById('timerDisplay');
  const controls = document.getElementById('timerControls');
  const pauseBtn = document.getElementById('timerPauseBtn');
  if (wrap && wrap.parentElement !== document.body) document.body.appendChild(wrap);
  const ms = timerRemainingMs();

  if (!forjaTimerState.active || ms <= 0) {
    document.body.classList.remove('timer-active');
    if (display) { display.textContent = ''; display.classList.remove('visible'); }
    if (controls) controls.classList.remove('visible');
    if (pauseBtn) pauseBtn.textContent = '⏸';
    return;
  }

  const totalSeconds = Math.ceil(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  if (display) {
    display.textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;
    display.classList.add('visible');
  }
  if (controls) controls.classList.add('visible');
  if (pauseBtn) pauseBtn.textContent = forjaTimerState.pausedMs !== null ? '▶' : '⏸';
  document.body.classList.add('timer-active');
}

function timerTick() {
  if (forjaTimerState.active && forjaTimerState.pausedMs === null && forjaTimerState.endAt && Date.now() >= forjaTimerState.endAt) {
    forjaTimerState = { active:false, endAt:null, pausedMs:null };
    saveStoredTimer();
    renderTimer();
    try { playTimerBeep(); } catch {}
    showToast('⏱ Descanso terminado — siguiente serie');
    return;
  }
  renderTimer();
}

function restartTimerInterval() {
  clearInterval(forjaTimerInterval);
  forjaTimerInterval = null;
  if (forjaTimerState.active && forjaTimerState.pausedMs === null) {
    forjaTimerInterval = setInterval(timerTick, 250);
  }
}

function startTimer(seconds) {
  const duration = Math.max(1, Number(seconds) || 120);
  unlockTimerAudio();
  forjaTimerState = { active:true, endAt: Date.now() + duration * 1000, pausedMs:null };
  saveStoredTimer();
  renderTimer();
  restartTimerInterval();
}

function adjustTimer(seconds) {
  if (!forjaTimerState.active) return;
  const delta = (Number(seconds) || 0) * 1000;
  if (forjaTimerState.pausedMs !== null) {
    forjaTimerState.pausedMs = Math.max(1000, forjaTimerState.pausedMs + delta);
  } else {
    forjaTimerState.endAt = Math.max(Date.now() + 1000, (forjaTimerState.endAt || Date.now()) + delta);
  }
  saveStoredTimer();
  renderTimer();
  restartTimerInterval();
}

function toggleTimerPause() {
  if (!forjaTimerState.active) return;
  if (forjaTimerState.pausedMs !== null) {
    forjaTimerState.endAt = Date.now() + forjaTimerState.pausedMs;
    forjaTimerState.pausedMs = null;
  } else {
    forjaTimerState.pausedMs = timerRemainingMs();
    forjaTimerState.endAt = null;
  }
  saveStoredTimer();
  renderTimer();
  restartTimerInterval();
}

function stopTimer() {
  clearInterval(forjaTimerInterval);
  forjaTimerInterval = null;
  forjaTimerState = { active:false, endAt:null, pausedMs:null };
  saveStoredTimer();
  renderTimer();
}

      { name: 'Extensión de Tríceps con Mancuerna' },

      { name: 'Extensión de Pierna' },

      { name: 'Peso Muerto Rumano (Mancuerna)' },
      { name: 'Curl de Pierna Sentado' },
      { name: 'Curl de Pierna Acostado' },

      { name: 'Crunch en Máquina' },
      { name: 'Elevación de Piernas' },
      { name: 'Crunch en Polea' }
    ];
    base.push(...extras);

    const map = new Map();
    for (const ex of base) {
      if (!ex || !ex.name) continue;
      const key = cleanTextForja(ex.name);
      if (!map.has(key)) {
        const cardio = ex.cardio === true || isCardioExerciseNameForja(ex.name);
        map.set(key, { ...ex, cardio, sets: ex.sets || (cardio ? 1 : 3) });
      }
    }
    return Array.from(map.values()).sort((a, b) => String(a.name).localeCompare(String(b.name), 'es'));
  }

  function setTemplateForja(ex, count, previousExercise){
    const total = Math.max(1, Number(count) || Number(ex?.sets) || (isCardioExerciseForja(ex) ? 1 : 3));
    return Array.from({ length: total }, (_, i) => {
      const old = previousExercise?.sets?.[i] || null;
      if (isCardioExerciseForja(ex)) return { weight: old?.weight || '', reps: old?.reps || '', done: false, cardio: true };
      if (isBodyweightForja(ex)) return { weight: '0', reps: old?.reps || '', done: false };

<script id="forja-fix-historial-sync-timer-2026-05-23">
(function(){
  function cloneForja(value){
    try { return JSON.parse(JSON.stringify(value)); } catch(e) { return value; }
  }

  function normalizeForjaSession(session){
    try {
      if (typeof normalizeSession === 'function') return normalizeSession(session);
    } catch(e) {}
    if (!session || typeof session !== 'object') return null;
    const source = session.data_json && typeof session.data_json === 'object' ? session.data_json : session;
    const copy = cloneForja(source);
    copy.routineName = copy.routineName || copy.routine_name || session.routine_name || copy.name || '';
    copy.routineId = copy.routineId || copy.routine_id || session.routine_id || '';
    copy.date = copy.date || session.date || copy.finishedAt || copy.createdAt || copy.startedAt || '';
    if (!copy.routineName || !copy.date || !Array.isArray(copy.exercises)) return null;
    copy.exercises = copy.exercises.map(ex => ({ ...ex, sets: Array.isArray(ex.sets) ? ex.sets : [] }));
    if (session._cloudId) copy._cloudId = session._cloudId;
    if (session.id && !copy._cloudId) copy._cloudId = session.id;
    return copy;
  }

  function localDayKeyForja(iso){
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return String(iso || '').slice(0,10);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function canonicalSessionKeyForja(session){
    const s = normalizeForjaSession(session);
    if (!s) return '';
    const rid = s.routineId || s.routineName;
    return `${String(rid).trim() || String(s.routineName).trim()}__${localDayKeyForja(s.date)}`;
  }

  function statusForja(session){
    const s = normalizeForjaSession(session);
    return String(s?.status || s?.sessionStatus || '').toLowerCase();
  }

  function isActiveForja(session){
    const s = normalizeForjaSession(session);
    if (!s) return false;
    const status = statusForja(s);
    return s.inProgress === true || s.isActive === true || status === 'active' || status === 'in_progress' || status === 'en_curso';
  }

  function doneSetsForja(session){
    const s = normalizeForjaSession(session);
    if (!s) return 0;
    return s.exercises.reduce((acc, ex) => acc + (Array.isArray(ex.sets) ? ex.sets.filter(st => st && st.done).length : 0), 0);
  }

  function validHistoryForja(session){
    const s = normalizeForjaSession(session);
    if (!s) return false;
    return isActiveForja(s) || doneSetsForja(s) > 0;
  }

  function scoreForja(session){
    const s = normalizeForjaSession(session);
    if (!s) return -1;
    const finishedBonus = isActiveForja(s) ? 0 : 1000000000;
    const doneBonus = doneSetsForja(s) * 1000000;
    const exerciseBonus = (s.exercises?.length || 0) * 1000;
    const updated = Date.parse(s.updatedAt || s.finishedAt || s.date || 0) || 0;
    return finishedBonus + doneBonus + exerciseBonus + updated / 1000000000000;
  }

  function dedupeForjaSafe(sessions){
    const map = new Map();
    for (const item of sessions || []) {
      const s = normalizeForjaSession(item);
      if (!s || !validHistoryForja(s)) continue;
      const key = canonicalSessionKeyForja(s);
      if (!key) continue;
      const current = map.get(key);
      if (!current || scoreForja(s) >= scoreForja(current)) map.set(key, s);
    }
    return Array.from(map.values()).sort((a,b) => new Date(b.date) - new Date(a.date));
  }

  window.forjaCanonicalSessionKey = canonicalSessionKeyForja;
  window.dedupeSessions = dedupeForjaSafe;
  window.sessionKey = canonicalSessionKeyForja;
  window.isActiveCloudSession = isActiveForja;
  window.doneSetsCount = doneSetsForja;

  window.getSessionsLocal = function(){
    const all = [];
    for (const key of ['gymlog_sessions','forja_sessions']) {
      try {
        const raw = JSON.parse(localStorage.getItem(key) || '[]');
        if (Array.isArray(raw)) all.push(...raw);
      } catch(e) {}
    }
    return dedupeForjaSafe(all);
  };

  window.setSessionsLocal = function(sessions){
    try {
      const existing = typeof getSessionsLocal === 'function' ? getSessionsLocal() : [];
      const merged = dedupeForjaSafe([...(existing || []), ...(sessions || [])]);
      localStorage.setItem('gymlog_sessions', JSON.stringify(merged.map(s => {
        try { return typeof stripCloudMeta === 'function' ? stripCloudMeta(s) : s; }
        catch(e) { return s; }
      })));
    } catch(e) {
      console.warn('setSessionsLocal safe', e);
    }
  };

  function getDraftForja(){
    try {
      if (typeof getActiveDraftSession === 'function') return getActiveDraftSession();
      const raw = JSON.parse(localStorage.getItem('gymlog_current_session') || 'null');

    try { if (typeof normalizeSession === 'function') {
      const n = normalizeSession(item);
      if (n) return n;
    }} catch(e) {}
    if (!item || typeof item !== 'object') return null;

    s.routineName = s.routineName || s.routine_name || item.routine_name || s.name || '';
    s.routineId = s.routineId || s.routine_id || item.routine_id || '';
    s.date = s.date || item.date || s.finishedAt || s.createdAt || s.startedAt || '';

  function status(s){ const n = normalize(s); return String(n?.status || n?.sessionStatus || '').toLowerCase(); }
  function active(s){
    const n = normalize(s); if (!n) return false;
    const st = status(n);
    return n.inProgress === true || n.isActive === true || st === 'active' || st === 'in_progress' || st === 'en_curso';
  }
  function done(s){
    const n = normalize(s); if (!n) return 0;
    return n.exercises.reduce((a,ex) => a + (Array.isArray(ex.sets) ? ex.sets.filter(x => x && x.done).length : 0), 0);
  }
  function volume(s){
    const n = normalize(s); if (!n) return 0;
    return n.exercises.reduce((a,ex) => a + (Array.isArray(ex.sets) ? ex.sets.filter(x => x && x.done).reduce((b,x) => b + ((parseFloat(x.weight)||0) * (parseFloat(x.reps)||0)), 0) : 0), 0);
  }
  function score(s){
    const n = normalize(s); if (!n) return -1;
    const finishedBonus = active(n) ? 0 : 10_000_000_000;
    const doneBonus = done(n) * 10_000_000;
    const volBonus = volume(n) * 10;
    const exerciseBonus = (n.exercises?.length || 0) * 1000;
    const timeBonus = (Date.parse(n.updatedAt || n.finishedAt || n.date || 0) || 0) / 1000000;

  function dedupe(list){
    const map = new Map();
