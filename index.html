      if (!s || !valid(s)) continue;
      const k = key(s);
      if (!k) continue;
      const prev = map.get(k);
      if (!prev || score(s) >= score(prev)) map.set(k, s);

  };
  function draft(){

  }
  window.getSessions = function(){
    const all = [];
    try { all.push(...(cloudSessions || [])); } catch(e) {}
    try { all.push(...getSessionsLocal()); } catch(e) {}
    try { if (typeof currentSession !== 'undefined' && currentSession) all.push(currentSession); } catch(e) {}
    const d = draft();
    if (d) all.push(d);
    return dedupe(all);
  };
  window.getFinishedSessions = function(){ return getSessions().filter(s => !active(s)); };

  async function fetchCloudRows(){
    if (typeof currentUser === 'undefined' || !currentUser || typeof supabaseClient === 'undefined') return [];
    const { data, error } = await supabaseClient.from('sessions').select('id, routine_id, routine_name, date, data_json').eq('user_id', currentUser.id);

  }
  function rowToSession(row){

    }

    }

    return n.exercises.reduce((a,ex) => a + (Array.isArray(ex.sets) ? ex.sets.filter(x => x && x.done).reduce((b,x) => b + ((parseFloat(x.weight)||0) * (parseFloat(x.reps)||0)), 0) : 0), 0);
  }
  function score(s){
    const n = normalize(s); if (!n) return -1;
    const finishedBonus = active(n) ? 0 : 10000000000;
    return finishedBonus + done(n)*10000000 + volume(n)*10 + (n.exercises?.length || 0)*1000 + ((Date.parse(n.updatedAt || n.finishedAt || n.date || 0) || 0) / 1000000);
  }
  function valid(s){ const n = normalize(s); return !!n && (active(n) || done(n) > 0); }
  function dedupe(list){
    const map = new Map();
    for (const raw of list || []) {
      const s = normalize(raw);
      if (!s || !valid(s)) continue;
      const k = key(s);
      if (!k) continue;
      const prev = map.get(k);
      if (!prev || score(s) >= score(prev)) map.set(k, s);
    }
    return Array.from(map.values()).sort((a,b) => new Date(b.date) - new Date(a.date));
  }
  function storageSessions(){
    const out = [];
    try {
      for (let i=0; i<localStorage.length; i++) {
        const k = localStorage.key(i) || '';
        if (k === 'gymlog_current_session') continue;
        if (!/^(gymlog_sessions|forja_sessions|forja_sessions_backup|gymlog_sessions_backup)/.test(k)) continue;
        try {
          const v = JSON.parse(localStorage.getItem(k) || '[]');
          if (Array.isArray(v)) out.push(...v);
        } catch(e) {}
      }
    } catch(e) {}
    return dedupe(out);
  }
  function saveLocalUnion(list){
    try {
      const merged = dedupe([...(storageSessions() || []), ...(list || [])]);
      localStorage.setItem('gymlog_sessions', JSON.stringify(merged.map(s => {
        try { return typeof stripCloudMeta === 'function' ? stripCloudMeta(s) : s; } catch(e) { return s; }
      })));
      return merged;
    } catch(e) { return dedupe(list || []); }
  }
  function draft(){
    try {
      const raw = JSON.parse(localStorage.getItem('gymlog_current_session') || 'null');
      return normalize(raw?.session || raw);
    } catch(e) { return null; }
  }
  window.forjaCanonicalSessionKey = key;
  window.sessionKey = key;
  window.dedupeSessions = dedupe;
  window.doneSetsCount = done;
  window.isActiveCloudSession = active;
  window.getSessionsLocal = storageSessions;
  window.setSessionsLocal = saveLocalUnion;
  window.getSessions = function(){
    const all = [];
    try { all.push(...(cloudSessions || [])); } catch(e) {}
    try { all.push(...storageSessions()); } catch(e) {}
    try { if (typeof currentSession !== 'undefined' && currentSession) all.push(currentSession); } catch(e) {}
    const d = draft();
    if (d) all.push(d);
    return dedupe(all);
  };
  window.getFinishedSessions = function(){ return getSessions().filter(s => !active(s)); };

  async function fetchRows(){
    if (typeof currentUser === 'undefined' || !currentUser || typeof supabaseClient === 'undefined') return [];
    const { data, error } = await supabaseClient.from('sessions').select('id, routine_id, routine_name, date, data_json').eq('user_id', currentUser.id);
    if (error) throw error;
    return data || [];
  }
  function rowToSession(row){ return normalize({ ...(row.data_json || {}), id:row.id, _cloudId:row.id, routine_id:row.routine_id, routine_name:row.routine_name, date:row.date }); }
  async function removeStaleActive(rows){
    try {
      if (typeof currentUser === 'undefined' || !currentUser || typeof supabaseClient === 'undefined') return;
      const groups = new Map();
      for (const row of rows || []) {
        const s = rowToSession(row);
        if (!s) continue;
        const k = key(s);
        if (!groups.has(k)) groups.set(k, []);
        groups.get(k).push({ row, session:s });
      }
      const ids = [];
      for (const group of groups.values()) {
        const finished = group.filter(x => !active(x.session));
        if (!finished.length) continue;
        const bestFinished = Math.max(...finished.map(x => score(x.session)));
        for (const a of group.filter(x => active(x.session))) {
          if (bestFinished >= score(a.session)) ids.push(a.row.id);
        }
      }
      if (ids.length) await supabaseClient.from('sessions').delete().eq('user_id', currentUser.id).in('id', ids);
    } catch(e) {}
  }
  window.loadCloudSessions = async function(){
    try {
      if (typeof currentUser === 'undefined' || !currentUser) { cloudSessions = []; return []; }
      let rows = await fetchRows();
      await removeStaleActive(rows);
      rows = await fetchRows();
      const cloud = dedupe(rows.map(rowToSession));
      const merged = saveLocalUnion(cloud);
      cloudSessions = dedupe([...cloud, ...merged]);
      return cloudSessions;
    } catch(e) {
      console.error('loadCloudSessions puntual', e);
      return cloudSessions || [];
    }
  };
  window.syncLocalSessionsToCloud = async function(){
    try {
      if (typeof currentUser === 'undefined' || !currentUser || typeof supabaseClient === 'undefined') return true;
      let rows = await fetchRows();
      await removeStaleActive(rows);
      rows = await fetchRows();
      const cloudMap = new Map();
      for (const row of rows) {
        const s = rowToSession(row);
        if (!s) continue;
        const prev = cloudMap.get(key(s));
        if (!prev || score(s) >= score(prev.session)) cloudMap.set(key(s), { row, session:s });
      }
      const local = storageSessions().filter(s => !active(s));
      for (const raw of local) {
        const s = normalize(raw);
        if (!s || !valid(s) || active(s)) continue;
        const k = key(s);
        const existing = cloudMap.get(k);
        const clean = (typeof stripCloudMeta === 'function') ? stripCloudMeta(s) : s;
        if (!existing) {
          const { data, error } = await supabaseClient.from('sessions').insert({
            user_id: currentUser.id,
            routine_id: clean.routineId,
            routine_name: clean.routineName,
            date: clean.date,
            data_json: clean
          }).select('id').single();
          if (error) throw error;
          cloudMap.set(k, { row:{ id:data?.id }, session:clean });
        } else if (score(clean) > score(existing.session)) {
          const { error } = await supabaseClient.from('sessions').update({
            routine_id: clean.routineId,
            routine_name: clean.routineName,
            date: clean.date,
            data_json: clean
          }).eq('user_id', currentUser.id).eq('id', existing.row.id);
          if (error) throw error;
          cloudMap.set(k, { row:existing.row, session:clean });
        }
      }
      await loadCloudSessions();
      return true;
    } catch(e) {
      console.error('syncLocalSessionsToCloud puntual', e);
      try { await loadCloudSessions(); } catch(_) {}
      return false;
    }
  };
  const prevShow = typeof showScreen === 'function' ? showScreen : null;
  if (prevShow) {
    window.showScreen = function(name){
      const result = prevShow.apply(this, arguments);
      if (name === 'history' || name === 'home') {
        setTimeout(function(){
          try { renderHistory(); renderHome(); } catch(e) {}
          try { if (typeof currentUser !== 'undefined' && currentUser) syncLocalSessionsToCloud().then(function(){ renderHistory(); renderHome(); }); } catch(e) {}
        }, 0);
      }
      return result;
    };
  }
  function run(){
    try {
      saveLocalUnion([]);
      if (typeof currentUser !== 'undefined' && currentUser) {
        syncLocalSessionsToCloud().then(function(){ try { renderHistory(); renderHome(); } catch(e) {} });
      } else {
        try { renderHistory(); renderHome(); } catch(e) {}
      }
    } catch(e) {}
  }
  window.addEventListener('pageshow', run, { passive:true });
  window.addEventListener('focus', run, { passive:true });
  setTimeout(run, 250);
  setTimeout(run, 1500);
})();
</script>

<script id="forja-fix-final-real-keyboard">
(function(){
  function isEditable(el){ return !!(el && /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)); }
  function syncKeyboard(){
    var vv = window.visualViewport;
    var offset = 0;
    if (vv) offset = Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop));
    var focused = isEditable(document.activeElement);
    var open = focused && (offset > 70 || window.innerHeight > (vv ? vv.height + 70 : 0));
    document.body.classList.toggle('keyboard-open', open);
    var ss = document.getElementById('sessionScreen');
    if (ss) ss.scrollLeft = 0;
    document.documentElement.scrollLeft = 0;
    document.body.scrollLeft = 0;
  }
  function bind(){
    if (window.visualViewport){
      window.visualViewport.addEventListener('resize', syncKeyboard, {passive:true});
      window.visualViewport.addEventListener('scroll', syncKeyboard, {passive:true});
    }
    window.addEventListener('resize', syncKeyboard, {passive:true});
    document.addEventListener('focusin', function(){ setTimeout(syncKeyboard, 80); }, true);
    document.addEventListener('focusout', function(){ setTimeout(syncKeyboard, 220); }, true);
    document.addEventListener('touchmove', function(){
      var ss = document.getElementById('sessionScreen');
      if (ss && ss.scrollLeft) ss.scrollLeft = 0;
    }, {passive:true});
    syncKeyboard();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bind); else bind();
})();
</script>

<script id="forja-fix-viewport-keyboard-final">
(function(){
  function isEditable(el){ return !!(el && /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)); }
  function syncKeyboardOffset(){
    var vv = window.visualViewport;
    var offset = 0;
    if (vv) offset = Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop));
    var focused = isEditable(document.activeElement);
    var open = focused && offset > 60;
    document.documentElement.style.setProperty('--forja-kb-offset', open ? offset + 'px' : '0px');
    document.body.classList.toggle('keyboard-open', open);
    var ss = document.getElementById('sessionScreen');
    if (ss) ss.scrollLeft = 0;
    document.documentElement.scrollLeft = 0;
    document.body.scrollLeft = 0;
  }
  function markSessionStartedState(){
    var ss = document.getElementById('sessionScreen');
    if (!ss) return;
    var isStarted = document.body.classList.contains('training-active');
    ss.classList.toggle('is-started', isStarted);
  }
  function tick(){ syncKeyboardOffset(); markSessionStartedState(); }
  function bind(){
    if (window.visualViewport){
      window.visualViewport.addEventListener('resize', tick, {passive:true});
      window.visualViewport.addEventListener('scroll', tick, {passive:true});
    }
    window.addEventListener('resize', tick, {passive:true});
    document.addEventListener('focusin', function(){ setTimeout(tick, 50); setTimeout(tick, 180); }, true);
    document.addEventListener('focusout', function(){ setTimeout(tick, 80); setTimeout(tick, 260); }, true);
    document.addEventListener('touchmove', function(){
      var ss = document.getElementById('sessionScreen');
      if (ss && ss.scrollLeft) ss.scrollLeft = 0;
    }, {passive:true});
    setInterval(markSessionStartedState, 500);
    tick();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bind); else bind();
})();
</script>
