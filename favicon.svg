<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D27A"/>
      <stop offset="38%" stop-color="#C9A24A"/>
      <stop offset="70%" stop-color="#9B7626"/>
      <stop offset="100%" stop-color="#D6B15C"/>
    </linearGradient>

    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#090909"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="92" fill="url(#dark)"/>
  <rect x="28" y="28" width="456" height="456" rx="82" fill="none" stroke="#C9A24A" stroke-width="9" opacity="0.42"/>

  <g filter="url(#shadow)">
    <!-- vertical steel block -->
    <path d="M128 122H198V390H128Z" fill="url(#gold)"/>

    <!-- top heavy forged bar with angled cut -->
    <path d="M128 122H384L360 190H128Z" fill="url(#gold)"/>

    <!-- middle forged bar, shorter and heavier -->
    <path d="M128 224H330L306 292H128Z" fill="url(#gold)"/>

    <!-- subtle inner cuts to make the F feel constructed, not flat -->
    <path d="M198 190H346L338 212H198Z" fill="#111111" opacity="0.55"/>
    <path d="M198 292H292L284 314H198Z" fill="#111111" opacity="0.45"/>

    <!-- edge highlights -->
    <path d="M128 122H384L376 144H136Z" fill="#F5DA83" opacity="0.38"/>
    <path d="M128 224H330L322 246H136Z" fill="#F5DA83" opacity="0.30"/>
    <path d="M128 122H148V390H128Z" fill="#F5DA83" opacity="0.22"/>
  </g>
</svg>
